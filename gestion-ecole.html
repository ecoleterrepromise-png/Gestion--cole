<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F4EC;
    --paper-panel:#EFEADA;
    --ink:#1B2A4A;
    --ink-soft:#4A5568;
    --bordeaux:#8B2635;
    --bordeaux-soft:#F1DEDE;
    --pine:#2F6B4F;
    --pine-soft:#DCEAE1;
    --brass:#A9781F;
    --brass-soft:#F1E5C8;
    --line:#D9D2BE;
    --white:#FFFDF8;
    --shadow: 0 2px 8px rgba(27,42,74,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces',serif;
    color:var(--ink);
    margin:0;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ===== Layout ===== */
  #app{
    display:flex;
    min-height:100vh;
  }
  nav.tabs{
    width:220px;
    flex-shrink:0;
    background:var(--paper-panel);
    border-right:1px solid var(--line);
    padding:28px 0;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .brand{
    padding:0 20px 22px 24px;
    border-bottom:1px solid var(--line);
    margin-bottom:14px;
  }
  .brand .stamp{
    display:inline-block;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:0.12em;
    color:var(--bordeaux);
    border:1px solid var(--bordeaux);
    padding:2px 6px;
    border-radius:2px;
    transform:rotate(-2deg);
    margin-bottom:8px;
  }
  .brand h1{font-size:22px; line-height:1.15;}
  .tab-btn{
    position:relative;
    text-align:left;
    background:transparent;
    border:none;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    font-weight:500;
    color:var(--ink-soft);
    padding:12px 20px 12px 24px;
    cursor:pointer;
    border-left:4px solid transparent;
    transition:all .15s ease;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .tab-btn .num{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    opacity:.55;
  }
  .tab-btn:hover{background:var(--white); color:var(--ink);}
  .tab-btn.active{
    background:var(--white);
    color:var(--ink);
    font-weight:600;
    border-left-color:var(--tab-color, var(--bordeaux));
    transform:translateX(2px);
    box-shadow:var(--shadow);
  }
  .tab-btn.active .num{color:var(--tab-color, var(--bordeaux)); opacity:1;}
  main{
    flex:1;
    padding:36px 44px;
    max-width:1100px;
  }
  .page-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:26px;
    padding-bottom:16px;
    border-bottom:2px solid var(--ink);
  }
  .page-head h2{font-size:28px;}
  .page-head p{margin:4px 0 0; color:var(--ink-soft); font-size:14px;}
  .btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13.5px;
    border:none;
    border-radius:3px;
    padding:10px 18px;
    cursor:pointer;
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .btn-primary{background:var(--ink); color:var(--white);}
  .btn-primary:hover{transform:translateY(-1px); box-shadow:var(--shadow);}
  .btn-outline{background:transparent; border:1.5px solid var(--ink); color:var(--ink);}
  .btn-outline:hover{background:var(--ink); color:var(--white);}
  .btn-danger{background:transparent; color:var(--bordeaux); border:1.5px solid var(--bordeaux);}
  .btn-danger:hover{background:var(--bordeaux); color:var(--white);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}

  /* ===== Cards / Dashboard ===== */
  .cards{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:32px;}
  .card{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:4px;
    padding:18px 20px;
    box-shadow:var(--shadow);
  }
  .card .big{font-family:'Fraunces',serif; font-size:32px; font-weight:600;}
  .card .label{font-size:12.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; margin-top:4px;}
  .card.alert .big{color:var(--bordeaux);}
  .card.ok .big{color:var(--pine);}

  .section-block{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:4px;
    padding:22px 24px;
    margin-bottom:22px;
    box-shadow:var(--shadow);
  }
  .section-block h3{font-size:17px; margin-bottom:14px;}
  .empty{
    color:var(--ink-soft);
    font-style:italic;
    padding:18px 0;
    text-align:center;
    border:1px dashed var(--line);
    border-radius:4px;
  }

  /* ===== Table ===== */
  table{width:100%; border-collapse:collapse;}
  th{
    text-align:left;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.05em;
    text-transform:uppercase;
    color:var(--ink-soft);
    border-bottom:1.5px solid var(--ink);
    padding:8px 10px;
  }
  td{
    padding:11px 10px;
    border-bottom:1px solid var(--line);
    font-size:14px;
    vertical-align:middle;
  }
  tr:hover td{background:#FBFAF6;}
  .row-actions{display:flex; gap:6px;}

  /* Stamp badges */
  .stamp-badge{
    display:inline-block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    font-weight:600;
    letter-spacing:.04em;
    padding:3px 9px;
    border-radius:2px;
    border:1.5px solid;
    transform:rotate(-1.5deg);
  }
  .stamp-pine{color:var(--pine); border-color:var(--pine); background:var(--pine-soft);}
  .stamp-bordeaux{color:var(--bordeaux); border-color:var(--bordeaux); background:var(--bordeaux-soft);}
  .stamp-brass{color:var(--brass); border-color:var(--brass); background:var(--brass-soft);}

  /* ===== Forms ===== */
  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px 18px; margin-bottom:16px;}
  .form-grid.wide{grid-template-columns:1fr;}
  .field label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--ink-soft);
    margin-bottom:5px;
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .field input, .field select, .field textarea{
    width:100%;
    padding:9px 11px;
    border:1.5px solid var(--line);
    border-radius:3px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    background:var(--white);
    color:var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none; border-color:var(--ink);
  }
  .field textarea{resize:vertical; min-height:70px;}

  .toolbar{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap;}
  .toolbar .filters{display:flex; gap:10px; flex-wrap:wrap;}
  .toolbar select, .toolbar input{
    padding:8px 10px; border:1.5px solid var(--line); border-radius:3px; font-size:13.5px; font-family:'Inter',sans-serif;
  }

  /* Modal */
  .overlay{
    position:fixed; inset:0; background:rgba(27,42,74,0.35);
    display:none; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:6px;
    padding:26px 28px;
    width:100%; max-width:520px;
    max-height:88vh; overflow-y:auto;
    box-shadow:0 12px 40px rgba(27,42,74,0.25);
  }
  .modal h3{font-size:19px; margin-bottom:18px; padding-bottom:10px; border-bottom:2px solid var(--ink);}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:8px;}

  /* Schedule grid */
  .sched-grid{display:grid; grid-template-columns:110px repeat(6,minmax(130px,1fr)); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:4px; min-width:890px;}
  .sched-cell{background:var(--white); padding:8px; min-height:64px; font-size:12px;}
  .sched-head{background:var(--ink); color:var(--white); font-family:'IBM Plex Mono',monospace; font-size:11.5px; text-align:center; padding:9px 4px; text-transform:uppercase; letter-spacing:.04em;}
  .sched-slot{
    background:var(--paper-panel);
    border-left:3px solid var(--bordeaux);
    border-radius:2px;
    padding:5px 7px;
    margin-bottom:4px;
    font-size:11.5px;
    position:relative;
  }
  .sched-slot .del{position:absolute; top:2px; right:4px; cursor:pointer; color:var(--bordeaux); font-weight:700; font-size:12px;}
  .add-slot-btn{
    width:100%; background:transparent; border:1px dashed var(--line); border-radius:2px;
    color:var(--ink-soft); font-size:11px; padding:5px; cursor:pointer;
  }
  .add-slot-btn:hover{border-color:var(--ink); color:var(--ink);}

  .att-row{display:flex; align-items:center; justify-content:space-between; padding:10px 4px; border-bottom:1px solid var(--line);}
  .att-row .name{font-weight:500;}
  .att-choices{display:flex; gap:6px;}
  .att-choices button{
    font-family:'IBM Plex Mono',monospace; font-size:11px; padding:5px 10px;
    border:1.5px solid var(--line); background:var(--white); border-radius:3px; cursor:pointer; color:var(--ink-soft);
  }
  .att-choices button.sel-present{background:var(--pine); border-color:var(--pine); color:#fff;}
  .att-choices button.sel-absent{background:var(--bordeaux); border-color:var(--bordeaux); color:#fff;}
  .att-choices button.sel-retard{background:var(--brass); border-color:var(--brass); color:#fff;}
  .att-choices button.sel-abandon{background:#3D3D3D; border-color:#3D3D3D; color:#fff;}

  .msg-item{border-bottom:1px solid var(--line); padding:14px 4px;}
  .msg-item .meta{display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft); margin-bottom:6px;}
  .msg-item .body{font-size:14px; line-height:1.5;}

  .loading{padding:60px; text-align:center; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}
  .save-note{
    position:fixed; bottom:18px; right:24px; background:var(--ink); color:var(--white);
    padding:9px 16px; border-radius:4px; font-size:12.5px; font-family:'IBM Plex Mono',monospace;
    opacity:0; transform:translateY(6px); transition:all .25s ease; pointer-events:none;
  }
  .save-note.show{opacity:1; transform:translateY(0);}

  @media (max-width:820px){
    #app{flex-direction:column;}
    nav.tabs{
      width:100%;
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:8px;
      padding:14px;
    }
    .brand{display:none;}
    .tab-btn{
      white-space:normal;
      border-left:none;
      border:2px solid var(--tab-color, var(--line));
      border-radius:8px;
      text-align:center;
      justify-content:center;
      flex-direction:column;
      gap:3px;
      padding:12px 6px;
      font-size:12px;
      line-height:1.25;
      color:var(--tab-color, var(--ink));
      font-weight:600;
    }
    .tab-btn .num{display:none;}
    .tab-btn:first-child{
      grid-column:1 / -1;
      font-size:16px;
      font-weight:700;
      padding:16px;
      background:var(--tab-color);
      color:var(--white);
      border-color:var(--tab-color);
    }
    .tab-btn.active{background:var(--tab-color, var(--ink)); color:var(--white); border-color:var(--tab-color, var(--ink)); transform:none; box-shadow:none;}
    .tab-btn:first-child.active{background:var(--tab-color); color:var(--white);}
    main{padding:22px 18px;}
    .cards{grid-template-columns:1fr 1fr;}
    .form-grid{grid-template-columns:1fr;}
    .sched-grid{grid-template-columns:80px repeat(6,minmax(110px,1fr)); min-width:740px; font-size:10px;}
  }
  .settings-fab{ display:none; }
  .lock-screen{
    position:fixed; inset:0; background:var(--ink);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:20px;
  }
  .lock-box{
    background:var(--paper); border-radius:8px; padding:32px 28px;
    width:100%; max-width:360px; box-shadow:0 20px 60px rgba(0,0,0,0.4);
    text-align:center;
  }
  .lock-box .stamp{
    display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10px;
    letter-spacing:.12em; color:var(--bordeaux); border:1px solid var(--bordeaux);
    padding:2px 8px; border-radius:2px; transform:rotate(-2deg);
  }
  .lock-box h1{font-family:'Fraunces',serif; color:var(--ink);}
  .lock-box input:focus{outline:none; border-color:var(--ink);}
</style>
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<body>

<div id="lockScreen" class="lock-screen">
  <div class="lock-box">
    <div class="stamp" style="margin-bottom:14px;">REGISTRE</div>
    <h1 id="lockTitle" style="font-size:22px; margin-bottom:8px;">Accès protégé</h1>
    <p id="lockSubtitle" style="color:var(--ink-soft); font-size:13.5px; margin-bottom:18px;">Entre ton code PIN pour ouvrir le registre.</p>
    <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="6" id="lockPasswordInput" placeholder="Code PIN (4 à 6 chiffres)" style="width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:4px; font-size:22px; letter-spacing:6px; text-align:center; margin-bottom:10px;">
    <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="6" id="lockPasswordConfirm" placeholder="Confirme le code PIN" style="width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:4px; font-size:22px; letter-spacing:6px; text-align:center; margin-bottom:10px; display:none;">
    <p id="lockError" style="color:var(--bordeaux); font-size:13px; margin:-2px 0 10px; display:none;">Code PIN incorrect.</p>
    <button class="btn btn-primary" id="lockSubmitBtn" style="width:100%; padding:12px;" onclick="handleLockSubmit()">Déverrouiller</button>
    <button type="button" id="lockForgotBtn" onclick="resetPinForgotten()" style="background:none; border:none; color:var(--ink-soft); font-size:12.5px; margin-top:16px; text-decoration:underline; cursor:pointer; display:none;">Code PIN oublié ?</button>
  </div>
</div>

<div id="app">
  <div class="loading" id="loadingScreen">Chargement du registre…</div>
</div>

<div class="save-note" id="saveNote">Enregistré ✓</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
/* ============ STATE ============ */
const JOURS = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
let state = { students:[], payments:[], schedule:[], attendance:[], messages:[], finances:[], grades:[], fraisScolarite:{}, staff:[], staffPayments:[], parentRegistry:{}, parentSeqCounter:0,
  plagesHoraires: ["08:00-10:00","10:00-12:00","14:00-16:00","16:00-18:00"], documents:[], documentLoans:[], reductionsFamille:{}, planningActivites:[],
  schoolInfo: { nom:"COMPLEXE SCOLAIRE TERRE PROMISE", telephone:"0197102175 / 01682090", anneeScolaire:"2025-2026", directeur:"", logo:null, signature:null, cachet:null, primeSeuil:10, primeMontant:0, fraisInscriptionPrimaire:0, fraisInscriptionCollege:0 } };
let currentTab = 'dashboard';
let attDate = new Date().toISOString().slice(0,10);
let familyChildRowCounter = 0;
let activeDocumentPrisId = null;
let staffPaymentPrime = null;
let primeStripOuverte = false;
let notesViewMode = 'saisie';

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function formatMontant(n){
  const val = Math.round(Number(n)||0);
  return val.toLocaleString('fr-FR') + ' FCFA';
}
function sortStudents(list){ return list.slice().sort((a,b)=> (a.nom+' '+a.prenom).localeCompare(b.nom+' '+b.prenom, 'fr')); }

async function loadState(){
  try{
    const raw = localStorage.getItem('ecole-state');
    if(raw){
      const parsed = JSON.parse(raw);
      state = {
        students: parsed.students||[],
        payments: parsed.payments||[],
        schedule: parsed.schedule||[],
        attendance: parsed.attendance||[],
        messages: parsed.messages||[],
        finances: parsed.finances||[],
        grades: parsed.grades||[],
        fraisScolarite: parsed.fraisScolarite||{},
        parentRegistry: parsed.parentRegistry||{},
        plagesHoraires: parsed.plagesHoraires||["08:00-10:00","10:00-12:00","14:00-16:00","16:00-18:00"],
        documents: parsed.documents||[],
        planningActivites: parsed.planningActivites||[],
        documentLoans: parsed.documentLoans||[],
        reductionsFamille: parsed.reductionsFamille||{},
        parentSeqCounter: parsed.parentSeqCounter||0,
        staff: parsed.staff||[],
        staffPayments: parsed.staffPayments||[],
        schoolInfo: Object.assign({ nom:"COMPLEXE SCOLAIRE TERRE PROMISE", telephone:"0197102175 / 01682090", anneeScolaire:"2025-2026", directeur:"", logo:null, signature:null, cachet:null, primeSeuil:10, primeMontant:0, fraisInscriptionPrimaire:0, fraisInscriptionCollege:0 }, parsed.schoolInfo||{}),
      };
    }
  }catch(e){ console.warn('Pas de données sauvegardées trouvées, ou stockage local indisponible.', e); }
}

async function saveState(){
  try{
    localStorage.setItem('ecole-state', JSON.stringify(state));
    const n = document.getElementById('saveNote');
    n.textContent = 'Enregistré ✓';
    n.classList.add('show');
    setTimeout(()=>n.classList.remove('show'), 1200);
  }catch(e){
    console.error('Erreur de sauvegarde', e);
    const n = document.getElementById('saveNote');
    n.textContent = "⚠ Sauvegarde impossible sur cet appareil";
    n.classList.add('show');
    setTimeout(()=>n.classList.remove('show'), 2500);
  }
}

/* ============ SHELL ============ */
function buildShell(){
  const tabs = [
    {id:'dashboard', label:"Tableau de bord", num:'00', color:'#1B2A4A'},
    {id:'students', label:"Élèves", num:'01', color:'#8B2635'},
    {id:'attendance', label:"Présences", num:'02', color:'#2F6B4F'},
    {id:'payments', label:"Paiements", num:'03', color:'#A9781F'},
    {id:'schedule', label:"Emploi du temps", num:'04', color:'#2C6E8E'},
    {id:'parents', label:"Infos aux parents", num:'05', color:'#6B4C8A'},
    {id:'finances', label:"Finances", num:'06', color:'#B5651D'},
    {id:'notes', label:"Notes & moyennes", num:'07', color:'#4B6B2F'},
    {id:'familles', label:"Parents & enfants", num:'08', color:'#3D5A80'},
    {id:'personnel', label:"Personnel", num:'09', color:'#8A5A1F'},
    {id:'documents', label:"Documents & Outils", num:'10', color:'#5A6472'},
    {id:'planning', label:"Planning", num:'11', color:'#7A5C3E'},
    {id:'settings', label:"Réglages", num:'⚙', color:'#4A5568'},
  ];
  document.getElementById('app').innerHTML = `
    <nav class="tabs">
      <div class="brand">
        <span class="stamp">REGISTRE</span>
        <h1>École — Gestion</h1>
      </div>
      ${tabs.map(t=>`<button class="tab-btn" data-tab="${t.id}" style="--tab-color:${t.color};"><span class="num">${t.num}</span>${t.label}</button>`).join('')}
    </nav>
    <main id="main"></main>
  `;
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      if(b.dataset.tab==='settings'){ openSchoolSettings(); return; }
      currentTab = b.dataset.tab; render();
    });
  });
}

function render(){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===currentTab));
  const main = document.getElementById('main');
  if(currentTab==='dashboard') main.innerHTML = renderDashboard();
  else if(currentTab==='students') main.innerHTML = renderStudents();
  else if(currentTab==='attendance') main.innerHTML = renderAttendance();
  else if(currentTab==='payments') main.innerHTML = renderPayments();
  else if(currentTab==='schedule') main.innerHTML = renderSchedule();
  else if(currentTab==='parents') main.innerHTML = renderParents();
  else if(currentTab==='finances') main.innerHTML = renderFinances();
  else if(currentTab==='notes') main.innerHTML = renderNotes();
  else if(currentTab==='familles') main.innerHTML = renderFamilles();
  else if(currentTab==='personnel') main.innerHTML = renderPersonnel();
  else if(currentTab==='documents') main.innerHTML = renderDocuments();
  else if(currentTab==='planning') main.innerHTML = renderPlanning();
  else if(currentTab==='promotion') main.innerHTML = renderPromotion();
  attachHandlers();
}

function openModal(html){
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
/* Remplace window.confirm() natif (parfois silencieusement bloqué par le navigateur) par une confirmation "maison" */
function confirmModal(message){
  return new Promise((resolve)=>{
    document.getElementById('modalContent').innerHTML = `
      <h3>Confirmation</h3>
      <p style="font-size:14px; line-height:1.5; margin:14px 0 20px;">${escapeHtml(message)}</p>
      <div class="modal-actions">
        <button class="btn btn-outline" id="confirmModalCancel">Annuler</button>
        <button class="btn btn-danger" id="confirmModalOk">Confirmer</button>
      </div>
    `;
    document.getElementById('overlay').classList.add('open');
    document.getElementById('confirmModalOk').onclick = ()=>{
      document.getElementById('overlay').classList.remove('open');
      resolve(true);
    };
    document.getElementById('confirmModalCancel').onclick = ()=>{
      document.getElementById('overlay').classList.remove('open');
      resolve(false);
    };
  });
}
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeModal(); });

function studentName(id){
  const s = state.students.find(x=>x.id===id);
  return s ? `${s.prenom} ${s.nom}` : '—';
}

/* ============ DASHBOARD ============ */
function renderDashboard(){
  const today = new Date().toISOString().slice(0,10);
  const todaysAttMap = {};
  state.attendance.filter(a=>a.date===today).forEach(a=> todaysAttMap[a.studentId]=a.statut);
  const actifs = state.students.filter(s=>!isAbandon(s.id));
  const absents = actifs.filter(s=>todaysAttMap[s.id]==='absent').length;
  const presents = actifs.length - absents;
  const enRetard = state.payments.filter(p=>p.statut==='retard').length;
  const totalDuBrut = state.students.filter(s=>!isAbandon(s.id)).reduce((sum,s)=>sum+Math.max(soldeEleve(s).restant,0),0);
  const totalReductions = totalReductionsFamilles();
  const totalDu = Math.max(totalDuBrut - totalReductions, 0);

  return `
    <div class="page-head">
      <div><h2>Tableau de bord</h2><p>${new Date().toLocaleDateString('fr-FR',{weekday:'long', day:'numeric', month:'long', year:'numeric'})}</p></div>
    </div>
    <div class="cards">
      <div class="card"><div class="big">${state.students.length}</div><div class="label">Élèves inscrits</div></div>
      <div class="card ok"><div class="big">${presents}</div><div class="label">Présents aujourd'hui</div></div>
      <div class="card ${absents>0?'alert':''}"><div class="big">${absents}</div><div class="label">Absents aujourd'hui</div></div>
      <div class="card ${enRetard>0?'alert':''}"><div class="big">${enRetard}</div><div class="label">Paiements en retard</div></div>
    </div>
    <div class="section-block">
      <h3>Solde restant dû (tous élèves)</h3>
      <p class="mono" style="font-size:24px; color:var(--bordeaux);">${formatMontant(totalDu)}</p>
      ${totalReductions>0 ? `<p style="font-size:12px; color:var(--pine); margin-top:4px;">Dont réductions accordées déduites : -${formatMontant(totalReductions)} (brut avant réduction : ${formatMontant(totalDuBrut)})</p>` : ''}
      <p style="font-size:11.5px; color:var(--ink-soft); margin-top:4px;">Les élèves marqués « Abandon » ne sont pas comptés dans ce total.</p>
    </div>
    <div class="section-block">
      <h3>Situation financière globale</h3>
      ${(()=>{
        const recettes = state.finances.filter(f=>f.type==='recette').reduce((s,f)=>s+Number(f.montant||0),0);
        const depenses = state.finances.filter(f=>f.type==='depense').reduce((s,f)=>s+Number(f.montant||0),0);
        const solde = recettes - depenses;
        return `
        <div class="cards" style="margin-bottom:0;">
          <div class="card ok"><div class="big mono">${formatMontant(recettes)}</div><div class="label">Total recettes</div></div>
          <div class="card alert"><div class="big mono">${formatMontant(depenses)}</div><div class="label">Total dépenses</div></div>
          <div class="card"><div class="big mono" style="color:${solde>=0?'var(--pine)':'var(--bordeaux)'};">${formatMontant(solde)}</div><div class="label">Solde net</div></div>
        </div>`;
      })()}
    </div>
    <div class="section-block">
      <h3>Derniers messages aux parents</h3>
      ${state.messages.slice(-3).reverse().map(m=>`
        <div class="msg-item"><div class="meta"><span>${studentName(m.studentId)}</span><span>${formatDateFR(m.date)}</span></div><div class="body">${escapeHtml(m.message)}</div></div>
      `).join('') || '<div class="empty">Aucun message envoyé pour le moment.</div>'}
    </div>
  `;
}

function escapeHtml(s){ const d=document.createElement('div'); d.innerText=s||''; return d.innerHTML; }
/* Affiche le nom complet d'un élève, en rouge si c'est une fille */
function nomEleveHtml(s){
  const style = s.sexe==='F' ? ' style="color:#8B2635;"' : '';
  return `<span${style}>${escapeHtml(s.prenom)} ${escapeHtml(s.nom)}</span>`;
}

/* ============ ÉLÈVES ============ */
function renderStudents(){
  const classes = [...new Set(state.students.map(s=>s.classe).filter(Boolean))].sort();
  return `
    <div class="page-head" style="flex-direction:column; align-items:flex-start; gap:12px;">
      <div><h2>Élèves &amp; inscriptions</h2><p>${state.students.length} élève(s) enregistré(s)</p></div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="openFamilyRegistrationForm()">+ Nouvelle inscription</button>
        <button class="btn btn-outline btn-sm" onclick="exportStudentsExcel()">Exporter Excel</button>
        <button class="btn btn-outline btn-sm" onclick="exportStudentsPDF()">Exporter PDF</button>
      </div>
    </div>
    <div class="toolbar">
      <div class="filters">
        <input type="text" id="studentSearch" placeholder="Rechercher un nom…" oninput="render()">
        <select id="classFilter" onchange="render()">
          <option value="">Toutes les classes</option>
          ${classes.map(c=>`<option value="${c}">${c}</option>`).join('')}
        </select>
      </div>
    </div>
    ${renderSynthese(getFilteredStudents())}
    <div class="section-block" style="overflow-x:auto;">
      ${studentsTable(classes)}
    </div>
  `;
}
function getFilteredStudents(){
  const search = (document.getElementById('studentSearch')?.value||'').toLowerCase();
  const cls = document.getElementById('classFilter')?.value||'';
  return state.students.filter(s=>{
    const matchSearch = !search || (s.nom+' '+s.prenom).toLowerCase().includes(search);
    const matchClass = !cls || s.classe===cls;
    return matchSearch && matchClass;
  });
}
function renderSynthese(list){
  const today = new Date().toISOString().slice(0,10);
  const todaysAtt = {};
  state.attendance.filter(a=>a.date===today).forEach(a=> todaysAtt[a.studentId]=a.statut);
  function countBy(filterFn){
    const g = list.filter(s=>s.sexe==='M' && filterFn(s)).length;
    const f = list.filter(s=>s.sexe==='F' && filterFn(s)).length;
    return { g, f, total: g+f };
  }
  const inscrits = countBy(()=>true);
  const abandons = countBy(s=>isAbandon(s.id));
  const absents = countBy(s=>!isAbandon(s.id) && todaysAtt[s.id]==='absent');
  const presents = countBy(s=>!isAbandon(s.id) && todaysAtt[s.id]!=='absent');
  const row = (label, data, note)=>`
    <tr><td><strong>${label}</strong>${note?` <span style="font-size:11px; color:var(--ink-soft); font-weight:400;">${note}</span>`:''}</td>
      <td class="mono">${data.g}</td><td class="mono">${data.f}</td><td class="mono"><strong>${data.total}</strong></td></tr>`;

/* Récupère (ou crée) l'entrée du registre des familles pour un couple père/mère, afin d'attribuer un numéro d'ordre stable */
function getOrCreateParentEntry(pereNom, mereNom){
  const key = `${(pereNom||'').trim().toLowerCase()}|${(mereNom||'').trim().toLowerCase()}` || '—sans-parent—';
  if(!state.parentRegistry) state.parentRegistry = {};
  if(!state.parentRegistry[key]){
    state.parentSeqCounter = (state.parentSeqCounter||0) + 1;
    state.parentRegistry[key] = { seq: state.parentSeqCounter, nextChildSeq: 0 };
  }
  return state.parentRegistry[key];
}
/* Génère le matricule définitif d'un élève (attribué une seule fois, à la création) : AA-PPP-EE */
function generateMatricule(dateInscription, pereNom, mereNom){
  const year = dateInscription ? new Date(dateInscription).getFullYear() : new Date().getFullYear();
  const yy = String(year).slice(-2);
  const entry = getOrCreateParentEntry(pereNom, mereNom);
  entry.nextChildSeq += 1;
  const parentSeq = String(entry.seq).padStart(3,'0');
  const childSeq = String(entry.nextChildSeq).padStart(2,'0');
  return `${yy}-${parentSeq}-${childSeq}`;
}
async function saveStudent(id){
  const data = {
    prenom: document.getElementById('f_prenom').value.trim(),
    nom: document.getElementById('f_nom').value.trim(),
    classe: document.getElementById('f_classe').value.trim(),
    niveau: document.getElementById('f_niveau').value,
    sexe: document.getElementById('f_sexe').value,
    dateNaissance: document.getElementById('f_naissance').value,
    statutClasse: document.getElementById('f_statutClasse').value,
    reductionRedoublant: document.getElementById('f_reductionRedoublant').checked,
    lieuNaissance: document.getElementById('f_lieuNaissance').value.trim(),
    pereNom: document.getElementById('f_pereNom').value.trim(),
    pereTel1: document.getElementById('f_pereTel1').value.trim(),
    pereTravail: document.getElementById('f_pereTravail').value.trim(),
    mereNom: document.getElementById('f_mereNom').value.trim(),
    mereTel1: document.getElementById('f_mereTel1').value.trim(),
    mereTravail: document.getElementById('f_mereTravail').value.trim(),
    parentEmail: document.getElementById('f_parentEmail').value.trim(),
    dateInscription: document.getElementById('f_inscription').value,
    arriere: parseFloat(document.getElementById('f_arriere').value)||0,
  };
  if(!data.prenom || !data.nom){ alert("Le prénom et le nom sont requis."); return; }
  if(id){
    const s = state.students.find(x=>x.id===id);
    Object.assign(s, data);
  }else{
    const matricule = generateMatricule(data.dateInscription, data.pereNom, data.mereNom);
    state.students.push({ id: uid(), matricule, ...data });
  }
  await saveState();
  closeModal();
  render();
}
async function deleteStudent(id){
  if(!(await confirmModal("Supprimer cet élève ? Cette action est définitive."))) return;
  state.students = state.students.filter(s=>s.id!==id);
  await saveState();
  render();
}

async function setAttendance(studentId, statut){
  const existing = state.attendance.find(a=>a.studentId===studentId && a.date===attDate);
  if(existing){
    if(existing.statut===statut){
      // on reclique sur le même bouton : on annule l'exception, retour à "présent" par défaut
      state.attendance = state.attendance.filter(a=>a!==existing);
    }else{
      existing.statut = statut;
    }
  }else{
    state.attendance.push({ id: uid(), studentId, date: attDate, statut });
  }
  await saveState();
  render();
}

async function savePayment(id){
  const data = {
    studentId: document.getElementById('f_pStudent').value,
    motif: document.getElementById('f_pMotif').value.trim(),
    montant: parseFloat(document.getElementById('f_pMontant').value)||0,
    echeance: document.getElementById('f_pEcheance').value,
    datePaiement: document.getElementById('f_pDatePaiement').value,
    statut: document.getElementById('f_pStatut').value,
  };
  if(!data.motif){ alert("Indiquez un motif."); return; }
  let payment;
  if(id){ payment = state.payments.find(x=>x.id===id); Object.assign(payment, data); }
  else{ payment = { id: uid(), ...data }; state.payments.push(payment); }
  syncPaymentToFinances(payment);
  await saveState();
  closeModal();
  render();
}
/* Fait entrer automatiquement un paiement de scolarité "Payé" dans les recettes de Finances, et le retire si le statut change */
function syncPaymentToFinances(payment){
  if(payment.statut==='paye'){
    let fin = payment.financeId ? state.finances.find(f=>f.id===payment.financeId) : null;
    const desc = `Scolarité — ${studentName(payment.studentId)} (${payment.motif})`;
    if(fin){
      fin.montant = payment.montant;
      fin.date = payment.datePaiement || fin.date || todayStr();
      fin.description = desc;
    }else{
      fin = { id: uid(), type:'recette', categorie:'Frais de scolarité', montant: payment.montant, date: payment.datePaiement || todayStr(), description: desc, autoPaymentId: payment.id };
      state.finances.push(fin);
      payment.financeId = fin.id;
    }
  }else if(payment.financeId){
    state.finances = state.finances.filter(f=>f.id!==payment.financeId);
    payment.financeId = null;
  }
}
async function deletePayment(id){
  if(!(await confirmModal("Supprimer ce paiement ?"))) return;
  const payment = state.payments.find(p=>p.id===id);
  if(payment && payment.financeId){
    state.finances = state.finances.filter(f=>f.id!==payment.financeId);
  }
  state.payments = state.payments.filter(p=>p.id!==id);
  await saveState();
  render();
}

/* Construit un tableau de synthèse (Inscrits/Présents/Ont la moyenne/...) pour un groupe d'élèves et un score donné */
/* Calcule les 7 lignes de synthèse (Inscrits, Présents, Ont la moyenne, ...) pour un groupe d'élèves et un score donné */
function synthDataRows(students, scoreFn){
  function countBy(filterFn){
    const g = students.filter(s=>s.sexe==='M' && filterFn(s)).length;
    const f = students.filter(s=>s.sexe==='F' && filterFn(s)).length;
    return { g, f, total: g+f };
  }
  const scores = {};
  students.forEach(s=>{ scores[s.id] = scoreFn(s); });
  const aScore = s => scores[s.id]!==null && scores[s.id]!==undefined;
  const inscrits = countBy(()=>true);
  const presents = countBy(aScore);
  const ontMoyenne = countBy(s=> aScore(s) && scores[s.id]>=10);
  const nOntPasMoyenne = countBy(s=> aScore(s) && scores[s.id]<10);
  const pct = (part, total)=> total>0 ? Math.round(part/total*1000)/10 : 0;
  const pctOnt = { g: pct(ontMoyenne.g,presents.g), f: pct(ontMoyenne.f,presents.f), total: pct(ontMoyenne.total,presents.total) };
  const pctNOnt = { g: pct(nOntPasMoyenne.g,presents.g), f: pct(nOntPasMoyenne.f,presents.f), total: pct(nOntPasMoyenne.total,presents.total) };
  const totalRow = { g: ontMoyenne.g+nOntPasMoyenne.g, f: ontMoyenne.f+nOntPasMoyenne.f, total: ontMoyenne.total+nOntPasMoyenne.total };
  return {
    inscrits, presents, ontMoyenne, pctOnt, nOntPasMoyenne, pctNOnt, totalRow,
    asRows(){
      return [
        ['Inscrits', inscrits.g, inscrits.f, inscrits.total],
        ['Présents', presents.g, presents.f, presents.total],
        ['Ont la moyenne', ontMoyenne.g, ontMoyenne.f, ontMoyenne.total],
        ['Pourcentage', pctOnt.g+'%', pctOnt.f+'%', pctOnt.total+'%'],
        ["N'ont pas la moyenne", nOntPasMoyenne.g, nOntPasMoyenne.f, nOntPasMoyenne.total],
        ['Pourcentage', pctNOnt.g+'%', pctNOnt.f+'%', pctNOnt.total+'%'],
        ['Total', totalRow.g, totalRow.f, totalRow.total],
      ];
    }
  };
}
function synthTableHtml(students, scoreFn, titre){
  const d = synthDataRows(students, scoreFn);
  const row = (label, data, isPct)=>`

}
/* Génère la synthèse classe par classe, devoir par devoir, puis annuelle */
function renderNotesSynthese(list){
  const byClasse = {};
  list.forEach(s=>{ const c=s.classe||'—'; (byClasse[c]=byClasse[c]||[]).push(s); });
  return Object.keys(byClasse).sort().map(cls=>{
    const studs = byClasse[cls];
    const maxDevoirs = Math.max(...studs.map(s=>devoirCount(s.niveau)));
    let html = `<h2 style="margin:26px 0 4px; font-family:'Fraunces',serif; font-size:20px;">${escapeHtml(cls)}</h2>`;
    for(let i=0;i<maxDevoirs;i++){
      html += synthTableHtml(studs, s=>{
        const g = state.grades.find(x=>x.studentId===s.id);
        if(!g) return null;
        const n = devoirCount(s.niveau);
        if(i>=n) return null;
        const v = g.notes[i];
        return (v!==undefined && v!==null && v!=='') ? Number(v) : null;
      }, `Devoir ${i+1}`);
    }
    html += synthTableHtml(studs, s=>{
      const g = state.grades.find(x=>x.studentId===s.id);
      if(!g) return null;
      const n = devoirCount(s.niveau);
      const valid = (g.notes||[]).slice(0,n).filter(v=>v!==undefined && v!==null && v!=='');
      if(!valid.length) return null;
      return valid.reduce((a,b)=>a+Number(b),0)/valid.length;
    }, 'Synthèse annuelle');
    return html;
  }).join('');
}

/* Calcule le rang (1er, 2e, ...) de chaque élève d'une classe selon un score donné. Retourne une Map studentId -> {rang, total} */
function computeRanks(students, scoreFn){
  const scored = students.map(s=>({id:s.id, score:scoreFn(s)})).filter(x=>x.score!==null && x.score!==undefined);
  scored.sort((a,b)=>b.score-a.score);
  const ranks = {};
  let rang = 0, prevScore = null, count = 0;
  scored.forEach(x=>{
    count++;
    if(x.score!==prevScore){ rang = count; prevScore = x.score; }
    ranks[x.id] = rang;
  });
  return { ranks, total: scored.length };
}
function rangLabel(rang, total){
  if(!rang) return '';
  const suffixe = rang===1 ? 'er' : 'e';
  return `${rang}${suffixe}/${total}`;
}
function notesTable(list){
  const maxDevoirs = Math.max(5, ...list.map(s=>devoirCount(s.niveau)));
  let headCols = '';
  for(let i=1;i<=maxDevoirs;i++) headCols += `<th>D${i}</th>`;

  // Regroupement par classe pour calculer les rangs (le rang se calcule toujours au sein d'une même classe)
  const byClasse = {};
  list.forEach(s=>{ const c=s.classe||''; (byClasse[c]=byClasse[c]||[]).push(s); });
  const rankData = {};
  Object.keys(byClasse).forEach(c=>{
    const studs = byClasse[c];
    const devoirRanks = [];
    for(let i=0;i<maxDevoirs;i++){
      devoirRanks.push(computeRanks(studs, s=>{
        const g = state.grades.find(x=>x.studentId===s.id);
        if(!g) return null;
        const n = devoirCount(s.niveau);
        if(i>=n) return null;
        const v = g.notes[i];
        return (v!==undefined && v!==null && v!=='') ? Number(v) : null;
      }));
    }
    const moyenneRanks = computeRanks(studs, s=>{
      const g = state.grades.find(x=>x.studentId===s.id);
      if(!g) return null;
      const n = devoirCount(s.niveau);
      const valid = (g.notes||[]).slice(0,n).filter(v=>v!==undefined && v!==null && v!=='');
      if(!valid.length) return null;
      return valid.reduce((a,b)=>a+Number(b),0)/valid.length;
    });
    rankData[c] = { devoirRanks, moyenneRanks };
  });

  return `
    <table>
      <thead><tr><th>Élève</th><th>Classe</th><th>Niveau</th>${headCols}<th>Moyenne</th><th>Rang</th><th>Statut</th></tr></thead>
      <tbody>
        ${list.map(s=>{
          const n = devoirCount(s.niveau);
          const g = state.grades.find(x=>x.studentId===s.id) || {studentId:s.id, notes:[]};
          const rd = rankData[s.classe||''];
          let cells='';
          for(let i=0;i<maxDevoirs;i++){
            if(i<n){
              const raw = g.notes[i];
              const val = (raw!==undefined && raw!==null) ? raw : '';
              const rInfo = rd.devoirRanks[i];
              const rang = rInfo.ranks[s.id];
              cells += `<td>
                <input type="number" min="0" max="20" step="0.5" style="width:56px; padding:5px;" value="${val}" onchange="updateNote('${s.id}', ${i}, this.value)">
                ${rang ? `<div class="mono" style="font-size:10px; color:var(--ink-soft); margin-top:2px;">${rangLabel(rang, rInfo.total)}</div>` : ''}
              </td>`;
            }else{
              cells += `<td class="mono" style="color:var(--line);">—</td>`;
            }
          }
          const validNotes = g.notes.slice(0,n).filter(v=>v!==undefined && v!==null && v!=='');
          const moyenne = validNotes.length ? (validNotes.reduce((a,b)=>a+Number(b),0)/validNotes.length) : null;
          const abandon = isAbandon(s.id);
          const statut = abandon
            ? '<span class="stamp-badge stamp-bordeaux">REDOUBLE (abandon)</span>'
            : (moyenne===null ? '—' : (moyenne>=10 ? '<span class="stamp-badge stamp-pine">PASSE</span>' : '<span class="stamp-badge stamp-bordeaux">REDOUBLE</span>'));
          const rangMoyInfo = rd.moyenneRanks;
          const rangMoy = rangMoyInfo.ranks[s.id];
          return `<tr>
            <td><strong>${nomEleveHtml(s)}</strong></td>
            <td>${escapeHtml(s.classe)||'—'}</td>
            <td>${s.niveau||'—'}</td>
            ${cells}
            <td class="mono">${moyenne!==null ? moyenne.toFixed(2)+'/20' : '—'}</td>
            <td class="mono">${rangMoy ? rangLabel(rangMoy, rangMoyInfo.total) : '—'}</td>
            <td>${statut}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

async function updateNote(studentId, index, value){
  let g = state.grades.find(x=>x.studentId===studentId);
  if(!g){ g = {studentId, notes:[]}; state.grades.push(g); }
  g.notes[index] = value==='' ? null : Math.max(0, Math.min(20, parseFloat(value)));
  await saveState();
  render();
}

/* Redimensionne une image uploadée (fond blanc) — utilisé pour le logo */
function resizeImageToDataURL(file, maxW, maxH){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error('lecture impossible'));
    reader.onload = (e)=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error('image invalide'));
      img.onload = ()=>{
        let w = img.width, h = img.height;
        const ratio = Math.min(maxW/w, maxH/h, 1);
        w = Math.round(w*ratio); h = Math.round(h*ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/png'));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
/* Redimensionne une image en conservant la transparence — utilisé pour la signature et le cachet */
function resizeImageToDataURLTransparent(file, maxW, maxH){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error('lecture impossible'));
    reader.onload = (e)=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error('image invalide'));
      img.onload = ()=>{
        let w = img.width, h = img.height;
        const ratio = Math.min(maxW/w, maxH/h, 1);
        w = Math.round(w*ratio); h = Math.round(h*ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/png'));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* Calcule le solde de scolarité d'un élève : frais annuel, total versé, restant dû */
/* Un élève est considéré en abandon dès qu'un pointage "abandon" a été enregistré pour lui, une fois */
function isAbandon(studentId){
  return state.attendance.some(a=>a.studentId===studentId && a.statut==='abandon');
}
/* Total de toutes les réductions accordées par famille (chaque réduction n'est comptée qu'une seule fois, pas par enfant) */
function totalReductionsFamilles(){
  return Object.values(state.reductionsFamille||{}).reduce((sum,montant)=>sum+Number(montant||0), 0);
}
function soldeEleve(s){
  const fraisBase = (state.fraisScolarite||{})[s.classe] || 0;
  const frais = (s.statutClasse==='Redoublant' && s.reductionRedoublant) ? Math.round(fraisBase * 0.5) : fraisBase;
  const arriere = Number(s.arriere||0);
  const fraisInscription = s.fraisInscriptionActif
    ? (s.niveau==='Collège' ? (state.schoolInfo.fraisInscriptionCollege||0) : (state.schoolInfo.fraisInscriptionPrimaire||0))
    : 0;
  const verse = state.payments.filter(p=>p.studentId===s.id && p.statut==='paye').reduce((sum,p)=>sum+Number(p.montant||0),0);
  // Ordre d'allocation des versements : arriéré d'abord, puis frais d'inscription, puis frais de l'année en cours
  let reste = verse;
  const arriereRestant = Math.max(arriere - reste, 0);
  reste = Math.max(reste - arriere, 0);
  const fraisInscriptionRestant = Math.max(fraisInscription - reste, 0);
  reste = Math.max(reste - fraisInscription, 0);
  const fraisRestant = Math.max(frais - reste, 0);
  const totalDu = frais + arriere + fraisInscription;
  const restant = arriereRestant + fraisInscriptionRestant + fraisRestant;
  return { frais, fraisBase, arriere, arriereRestant, fraisInscription, fraisInscriptionRestant, fraisRestant, totalDu, verse, restant };
}

/* Helper : bloc de signature en pied de page PDF */
function pdfSignature(doc, yPos){
  const pageHeight = doc.internal.pageSize.getHeight();
  if(yPos > pageHeight - 65){ doc.addPage(); yPos = 25; }
  const info = state.schoolInfo;
  doc.setFontSize(11);
  doc.setFont(undefined, 'normal');
  const label = 'Le Directeur';
  const xRight = 196;
  const textWidth = doc.getTextWidth(label);
  doc.text(label, xRight, yPos, {align:'right'});
  doc.setLineWidth(0.4);
  doc.setDrawColor(27,42,74);
  doc.line(xRight - textWidth, yPos + 1.5, xRight, yPos + 1.5);

  const boxTop = yPos + 3;
  if(info.cachet){
    try{ doc.addImage(info.cachet, 'PNG', xRight-95, boxTop, 28, 28); }catch(e){ /* image illisible, ignorée */ }
  }
  if(info.signature){
    try{ doc.addImage(info.signature, 'PNG', xRight-58, boxTop+5, 55, 24); }catch(e){ /* image illisible, ignorée */ }
  }
  const nameY = boxTop + 34;
  doc.setFontSize(10);
  doc.text(info.directeur || '', xRight, nameY, {align:'right'});
  return nameY;
}
/* Helper : bloc de signature en pied de feuille Excel (soulignement simulé par une ligne de tirets, Excel ne permettant pas le vrai soulignement via cet outil) */
function addSignatureToSheet(ws, dataRowCount){
  const startRow = 5 + dataRowCount + 3;
  XLSX.utils.sheet_add_aoa(ws, [
    ['Le Directeur'],
    ['_____________'],
    [],
    [state.schoolInfo.directeur || '']
  ], {origin: `A${startRow}`});
}

  };
  if(!data.prenom || !data.nom){ alert("Le prénom et le nom sont requis."); return; }

  else{ state.staff.push({ id: uid(), ...data }); }
  await saveState();
  closeModal();
  render();
}
async function deleteStaff(id){
  if(!(await confirmModal("Supprimer ce membre du personnel ? Ses paiements associés seront aussi supprimés."))) return;
  const paymentsToRemove = state.staffPayments.filter(sp=>sp.staffId===id);
  paymentsToRemove.forEach(sp=>{ if(sp.financeId) state.finances = state.finances.filter(f=>f.id!==sp.financeId); });
  state.staffPayments = state.staffPayments.filter(sp=>sp.staffId!==id);
  state.staff = state.staff.filter(x=>x.id!==id);
  await saveState();
  render();
}
function openStaffPaymentForm(){

function recalcMontantHoraire(){
  const heures = parseFloat(document.getElementById('f_spHeures').value)||0;
  const taux = parseFloat(document.getElementById('f_spTauxHoraire').value)||0;
  document.getElementById('f_spMontant').value = Math.round(heures*taux);
}
function onStaffPaymentSelectionChange(){
  staffPaymentPrime = null;
  primeStripOuverte = false;
  const staffId = document.getElementById('f_spStaff').value;
  refreshStaffPaymentModal(staffId);
}
function togglePrimeStrip(){
  if(staffPaymentPrime){ return; } // déjà appliquée, on passe par "Retirer"
  primeStripOuverte = !primeStripOuverte;
  refreshStaffPaymentModal();
}
function calculerAppliquerPrime(){
  const classe = document.getElementById('f_primeClasse').value;
  const devoirIndex = parseInt(document.getElementById('f_primeDevoir').value, 10);
  const seuil = state.schoolInfo.primeSeuil!==undefined ? state.schoolInfo.primeSeuil : 10;
  const montantParEleve = state.schoolInfo.primeMontant || 0;
  const studentsClasse = state.students.filter(s=>s.classe===classe);
  let nbEligibles = 0;
  studentsClasse.forEach(s=>{
    const g = state.grades.find(x=>x.studentId===s.id);
    if(!g) return;
    const n = devoirCount(s.niveau);
    if(devoirIndex>=n) return;
    const v = g.notes[devoirIndex];
    if(v!==undefined && v!==null && v!=='' && Number(v)>=seuil) nbEligibles++;
  });
  const total = nbEligibles * montantParEleve;
  staffPaymentPrime = { classe, devoirIndex, seuil, montantParEleve, nbEligibles, total };
  primeStripOuverte = false;
  refreshStaffPaymentModal();
}
function retirerPrime(){
  staffPaymentPrime = null;
  refreshStaffPaymentModal();
}
function refreshStaffPaymentModal(forcedStaffId){
  const staffList = state.staff.slice().sort((a,b)=>(a.nom+a.prenom).localeCompare(b.nom+b.prenom,'fr'));
  const staffId = forcedStaffId || document.getElementById('f_spStaff')?.value || staffList[0].id;
  const mois = document.getElementById('f_spMois')?.value;
  const date = document.getElementById('f_spDate')?.value;
  document.getElementById('modalContent').innerHTML = staffPaymentModalHtml(staffList, staffId);
  document.getElementById('f_spStaff').value = staffId;
  if(mois) document.getElementById('f_spMois').value = mois;
  if(date) document.getElementById('f_spDate').value = date;
}
async function saveStaffPayment(){
  const staffId = document.getElementById('f_spStaff').value;
  const mois = document.getElementById('f_spMois').value;
  const montantBase = parseFloat(document.getElementById('f_spMontant').value)||0;
  const date = document.getElementById('f_spDate').value;
  if(!staffId || !montantBase){ alert("Sélectionnez un employé et indiquez un montant."); return; }
  const st = state.staff.find(x=>x.id===staffId);
  const categorie = st ? (st.categorie||'fixe') : 'fixe';
  const primeTotal = (categorie!=='prestataire' && staffPaymentPrime) ? staffPaymentPrime.total : 0;
  const montant = montantBase + primeTotal;
  const payment = { id: uid(), staffId, mois, montant, montantBase, date, prime: (categorie!=='prestataire'?staffPaymentPrime:null) };
  if(categorie==='horaire'){
    payment.heures = parseFloat(document.getElementById('f_spHeures').value)||0;
    payment.tauxHoraire = parseFloat(document.getElementById('f_spTauxHoraire').value)||0;
  }else if(categorie==='prestataire'){
    payment.description = document.getElementById('f_spDescription').value.trim();
  }
  const fin = { id: uid(), type:'depense', categorie:'Salaires', montant, date, description: `${categorieLabel(categorie)} — ${st?st.prenom+' '+st.nom:''} (${mois})${primeTotal>0?' + prime de rendement':''}`, autoStaffPaymentId: payment.id };
  state.finances.push(fin);
  payment.financeId = fin.id;
  state.staffPayments.push(payment);
  staffPaymentPrime = null;
  await saveState();
  closeModal();
  render();
}
async function deleteStaffPayment(id){

  state.staffPayments = state.staffPayments.filter(x=>x.id!==id);
  await saveState();
  render();
}
function buildFichePaieDoc(sp, st){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const startY = pdfHeader(doc, "FICHE DE PAIE");
  doc.setFontSize(10);
  const staffName = st ? `${st.prenom} ${st.nom}` : '—';
  const loansAbimes = st ? state.documentLoans.filter(l=>l.abime && l.staffName===staffName) : [];
  const totalDeductions = loansAbimes.reduce((sum,l)=>{
    const d = state.documents.find(x=>x.id===l.documentId);
    return sum + Number(d?d.prix:0);
  }, 0);
  const categorie = st ? (st.categorie||'fixe') : 'fixe';
  const lignes = [
    ['Employé', staffName],
    ['Fonction', st ? (st.poste||'—') : '—'],
    ['Catégorie', categorieLabel(categorie)],
    ['Période', sp.mois||'—'],
    ['Date de paiement', sp.date||'—'],
  ];
  if(categorie==='horaire' && sp.heures){
    lignes.push(['Heures travaillées', `${sp.heures} h`]);
    lignes.push(['Taux horaire', formatMontant(sp.tauxHoraire||0)+'/h']);
    lignes.push(['Salaire de base (heures × taux)', formatMontant(sp.montantBase!==undefined ? sp.montantBase : sp.montant)]);
  }else if(categorie==='prestataire'){
    lignes.push(['Prestation', sp.description || '—']);
    lignes.push(['Montant de la prestation', formatMontant(sp.montantBase!==undefined ? sp.montantBase : sp.montant)]);
  }else{
    lignes.push(['Salaire de base', formatMontant(sp.montantBase!==undefined ? sp.montantBase : sp.montant)]);
  }
  if(sp.prime){
    lignes.push([`Prime de rendement (${sp.prime.classe} — Devoir ${sp.prime.devoirIndex+1} — ${sp.prime.nbEligibles} élève(s) ≥ ${sp.prime.seuil}/20)`, `+ ${formatMontant(sp.prime.total)}`]);
  }
  lignes.push([categorie==='prestataire' ? 'Total' : 'Salaire total', formatMontant(sp.montant)]);
  if(totalDeductions>0){
    lignes.push(['Déductions (documents/outils abîmés ou perdus)', `- ${formatMontant(totalDeductions)}`]);
    lignes.push(['Montant net payé', formatMontant(sp.montant - totalDeductions)]);
  }else{
    lignes.push(['Montant net payé', formatMontant(sp.montant)]);
  }
  doc.autoTable({
    startY: startY + 4,
    body: lignes,
    styles:{fontSize:10, cellPadding:4},
    columnStyles:{0:{fontStyle:'bold', cellWidth:80}},
    theme:'grid'
  });
  let y = doc.lastAutoTable.finalY + 8;
  if(loansAbimes.length>0){
    doc.setFontSize(9);
    doc.setTextColor(139,38,53);
    doc.text("Détail des documents/outils concernés :", 14, y);
    y += 5;
    loansAbimes.forEach(l=>{
      const d = state.documents.find(x=>x.id===l.documentId);
      doc.text(`- ${d?d.nom:'—'} (${formatMontant(d?d.prix:0)})`, 16, y);
      y += 5;
    });
    doc.setTextColor(0,0,0);
    y += 4;
  }
  pdfSignature(doc, y + 16);
  return doc;
}
function fichePaieFileName(sp, st){
  return `fiche-paie-${(st?st.nom:'employe')}-${sp.mois}.pdf`;
}
function downloadFichePaie(paymentId){
  const sp = state.staffPayments.find(x=>x.id===paymentId);

async function envoyerFichePaieWhatsApp(paymentId){
  const sp = state.staffPayments.find(x=>x.id===paymentId);
  if(!sp){ alert("Paiement introuvable."); return; }
  const st = state.staff.find(x=>x.id===sp.staffId);
  try{
    const doc = buildFichePaieDoc(sp, st);
    const fileName = fichePaieFileName(sp, st);
    const blob = doc.output('blob');
    const texte = `Fiche de paie — ${state.schoolInfo.nom}\nEmployé : ${st?st.prenom+' '+st.nom:''}\nPériode : ${sp.mois}\nMontant net : ${formatMontant(sp.montant)}`;

    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({ files:[file], title:'Fiche de paie', text: texte });
        return;
      }catch(e){
        if(e && e.name==='AbortError') return;
      }
    }
    // Repli : téléchargement du PDF + ouverture de la conversation WhatsApp de l'employé avec un message pré-rempli
    const link = document.createElement('a');
    link.download = fileName;
    link.href = URL.createObjectURL(blob);
    document.body.appendChild(link);

    document.body.removeChild(link);
    const numero = formatWhatsAppNumber(st ? st.telephone : '');
    const waUrl = numero ? `https://wa.me/${numero}?text=${encodeURIComponent(texte)}` : `https://wa.me/?text=${encodeURIComponent(texte)}`;
    alert("Ton navigateur ne permet pas d'envoyer le PDF directement dans WhatsApp. La fiche a été téléchargée : ouvre WhatsApp puis joins-la manuellement à la conversation qui va s'ouvrir.");
    window.open(waUrl, '_blank');
  }catch(e){ alert("Export impossible : connecte-toi une fois à Internet pour charger l'outil d'export, puis réessaie."); }
}

/* ============ REÇU DE PAIEMENT (JPEG) PAR PARENT ============ */
/* Construit le canvas du reçu ; retourne une Promise résolue avec le canvas prêt */
function loadImageAsync(src){
  return new Promise((resolve)=>{
    if(!src){ resolve(null); return; }
    const img = new window.Image();
    img.onload = ()=>resolve(img);
    img.onerror = ()=>resolve(null);
    img.src = src;
  });
}
function buildRecuCanvas(p, s){
  return new Promise((resolve)=>{
    (async ()=>{
      const info = state.schoolInfo;
      const canvas = document.createElement('canvas');
      const afficherFraisInscription = s && s.fraisInscriptionActif && soldeEleve(s).fraisInscription > 0;
      const W = 800, H = 1100 + (afficherFraisInscription ? 80 : 0);
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#F7F4EC';
      ctx.fillRect(0,0,W,H);
      ctx.strokeStyle = '#1B2A4A';
      ctx.lineWidth = 3;
      ctx.strokeRect(20,20,W-40,H-40);

      const [logoImg, sigImg, cachetImg] = await Promise.all([
        loadImageAsync(info.logo), loadImageAsync(info.signature), loadImageAsync(info.cachet)
      ]);
      if(logoImg) ctx.drawImage(logoImg, 60, 45, 70, 70);
      finishReceipt(logoImg, sigImg, cachetImg);

    function finishReceipt(logoImg, sigImg, cachetImg){
      const textX = logoImg ? 150 : 60;
      ctx.fillStyle = '#1B2A4A';
      ctx.font = 'bold 26px Arial';
      ctx.fillText(info.nom || '', textX, 70);
      ctx.font = '15px Arial';
      ctx.fillStyle = '#4A5568';
      ctx.fillText(`Téléphone : ${info.telephone||''}`, textX, 96);
      ctx.fillText(`Année scolaire : ${info.anneeScolaire||''}`, textX, 116);

      ctx.strokeStyle = '#8B2635';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(60,140); ctx.lineTo(W-60,140); ctx.stroke();

      ctx.fillStyle = '#8B2635';
      ctx.font = 'bold 30px Georgia';
      ctx.textAlign = 'center';
      ctx.fillText('REÇU DE PAIEMENT', W/2, 190);
      ctx.textAlign = 'left';

      ctx.fillStyle = '#1B2A4A';
      ctx.font = '14px Arial';
      ctx.fillText(`N° ${p.id.slice(-8).toUpperCase()}`, 60, 220);
      ctx.textAlign = 'right';
      ctx.fillText(`Date : ${p.datePaiement || todayStr()}`, W-60, 220);
      ctx.textAlign = 'left';

      const solde = s ? soldeEleve(s) : {frais:0, arriere:0, arriereRestant:0, fraisRestant:0, totalDu:0, verse:0, restant:0};
      const restantTxte = solde.totalDu===0 ? 'Frais non défini' : (solde.restant<=0 ? 'Soldé (0 FCFA)' : formatMontant(solde.restant));
      const nomParents = s ? [s.pereNom, s.mereNom].filter(Boolean).join(' & ') : '';
      const champs = [
        ['Reçu de la part de (parent/tuteur)', nomParents || 'Non renseigné'],
        ['Pour l\u2019élève', s ? `${s.prenom} ${s.nom} (${s.classe||'—'}) — Matricule ${s.matricule||'—'}` : '—'],
        ['Motif', p.motif || '—'],
        ['Montant reçu', formatMontant(p.montant)],
        ['Arriéré restant (après ce paiement)', solde.arriereRestant>0 ? formatMontant(solde.arriereRestant)+' — reste dû sur l\u2019arriéré' : 'Soldé'],
      ];
      if(afficherFraisInscription){
        champs.push(['Frais d\u2019inscription restant', solde.fraisInscriptionRestant>0 ? formatMontant(solde.fraisInscriptionRestant) : `Soldé (${formatMontant(solde.fraisInscription)})`]);
      }
      champs.push(['Restant dû sur la scolarité (total)', restantTxte]);
      let cy = 270;
      champs.forEach(([label, val])=>{
        ctx.fillStyle = '#4A5568';
        ctx.font = '14px Arial';
        ctx.fillText(label, 60, cy);
        ctx.fillStyle = label.startsWith('Restant') ? (solde.restant>0 ? '#8B2635' : '#2F6B4F')
          : label.startsWith('Arriéré') ? (solde.arriereRestant>0 ? '#8B2635' : '#2F6B4F')
          : label.startsWith('Frais d\u2019inscription') ? (solde.fraisInscriptionRestant>0 ? '#8B2635' : '#2F6B4F')
          : '#1B2A4A';
        ctx.font = 'bold 20px Arial';
        ctx.fillText(val, 60, cy+28);
        ctx.strokeStyle = '#D9D2BE';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(60,cy+42); ctx.lineTo(W-60,cy+42); ctx.stroke();
        cy += 80;
      });

      // tampon PAYÉ
      ctx.save();
      ctx.translate(W-160, cy+40);
      ctx.rotate(-0.06);
      ctx.strokeStyle = '#2F6B4F';
      ctx.lineWidth = 3;
      ctx.strokeRect(-110,-30,220,60);
      ctx.fillStyle = '#2F6B4F';
      ctx.font = 'bold 20px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('PAYÉ', 0, 8);
      ctx.restore();
      ctx.textAlign = 'left';

      // signature
      const sigY = H - 170;
      ctx.fillStyle = '#1B2A4A';
      ctx.font = '16px Arial';
      ctx.textAlign = 'right';
      ctx.fillText('Le Directeur', W-60, sigY);
      ctx.strokeStyle = '#1B2A4A';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(W-60-ctx.measureText('Le Directeur').width, sigY+4); ctx.lineTo(W-60, sigY+4); ctx.stroke();
      if(cachetImg) ctx.drawImage(cachetImg, W-260, sigY+14, 65, 65);
      if(sigImg) ctx.drawImage(sigImg, W-175, sigY+22, 115, 48);
      ctx.font = '15px Arial';
      ctx.fillText(info.directeur || '', W-60, sigY+90);
      ctx.textAlign = 'left';

      resolve(canvas);
    }
    })();
  });
}

/* Convertit un numéro local en format international pour WhatsApp (hypothèse Bénin +229 si aucun indicatif n'est présent) */
function formatWhatsAppNumber(tel){
  let t = (tel||'').replace(/[^0-9+]/g,'');
  if(!t) return '';
  if(t.startsWith('+')) return t.slice(1);
  if(t.startsWith('00')) return t.slice(2);
  if(t.startsWith('0')) return '229' + t.slice(1);
  return t;
}
async function envoyerRecuWhatsApp(paymentId){
  const p = state.payments.find(x=>x.id===paymentId);
  if(!p){ alert("Paiement introuvable."); return; }

  const texte = `Reçu de paiement — ${state.schoolInfo.nom}\nÉlève : ${s?s.prenom+' '+s.nom:''}\nMontant reçu : ${formatMontant(p.montant)}\nMerci.`;

  canvas.toBlob(async (blob)=>{
    const file = new File([blob], fileName, {type:'image/jpeg'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({ files:[file], title:'Reçu de paiement', text: texte });
        return;
      }catch(e){
        if(e && e.name==='AbortError') return; // annulé par l'utilisateur, on ne fait rien de plus
      }
    }
    // Repli : téléchargement de l'image + ouverture de la conversation WhatsApp du parent avec un message pré-rempli
    const link = document.createElement('a');
    link.download = fileName;
    link.href = URL.createObjectURL(blob);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    const numero = formatWhatsAppNumber(s ? primaryParentPhone(s) : '');
    const waUrl = numero ? `https://wa.me/${numero}?text=${encodeURIComponent(texte)}` : `https://wa.me/?text=${encodeURIComponent(texte)}`;
    alert("Ton navigateur ne permet pas d'envoyer l'image directement dans WhatsApp. Le reçu a été téléchargé : ouvre WhatsApp puis joins-le manuellement à la conversation qui va s'ouvrir.");
    window.open(waUrl, '_blank');
  }, 'image/jpeg', 0.92);
}

/* ============ RAPPORT DE PAIEMENT PAR PARENT (tous les enfants, JPEG) ============ */
function buildRapportFamilleCanvas(fam){
  return new Promise((resolve)=>{
    (async ()=>{
      const info = state.schoolInfo;
      const enfants = sortStudents(fam.enfants);
      const W = 800;
      const H = 950 + enfants.length*50;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#F7F4EC';
      ctx.fillRect(0,0,W,H);
      ctx.strokeStyle = '#1B2A4A';
      ctx.lineWidth = 3;
      ctx.strokeRect(20,20,W-40,H-40);

      const [logoImg, sigImg, cachetImg] = await Promise.all([
        loadImageAsync(info.logo), loadImageAsync(info.signature), loadImageAsync(info.cachet)
      ]);
      if(logoImg) ctx.drawImage(logoImg, 60, 45, 70, 70);
      const textX = logoImg ? 150 : 60;

      ctx.fillStyle = '#1B2A4A';
      ctx.font = 'bold 26px Arial';
      ctx.fillText(info.nom || '', textX, 70);
      ctx.font = '15px Arial';
      ctx.fillStyle = '#4A5568';
      ctx.fillText(`Téléphone : ${info.telephone||''}`, textX, 96);
      ctx.fillText(`Année scolaire : ${info.anneeScolaire||''}`, textX, 116);

      ctx.strokeStyle = '#8B2635';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(60,140); ctx.lineTo(W-60,140); ctx.stroke();

      ctx.fillStyle = '#8B2635';
      ctx.font = 'bold 26px Georgia';
      ctx.textAlign = 'center';
      ctx.fillText('RAPPORT DE PAIEMENT — SCOLARITÉ', W/2, 185);
      ctx.textAlign = 'left';

      ctx.fillStyle = '#1B2A4A';
      ctx.font = '14px Arial';
      ctx.fillText(`Parent / Tuteur : ${fam.nom}`, 60, 215);
      ctx.textAlign = 'right';
      ctx.fillText(`Date : ${todayStr()}`, W-60, 215);
      ctx.textAlign = 'left';
      if(fam.tel) ctx.fillText(`Téléphone : ${fam.tel}`, 60, 236);

      let cy = 275;
      ctx.font = 'bold 13px Arial';
      ctx.fillStyle = '#1B2A4A';
      ctx.fillText('Enfant', 60, cy);
      ctx.fillText('Classe', 320, cy);
      ctx.fillText('Total dû', 430, cy);
      ctx.fillText('Versé', 555, cy);
      ctx.fillText('Restant', 675, cy);
      cy += 10;
      ctx.strokeStyle = '#1B2A4A'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(60,cy); ctx.lineTo(W-60,cy); ctx.stroke();
      cy += 32;

      let totalDuGlobal=0, totalVerse=0, totalRestant=0, totalArriereRestant=0;
      ctx.font = '13px Arial';
      enfants.forEach(s=>{
        const abandon = isAbandon(s.id);
        const {totalDu, verse, restant, arriereRestant} = soldeEleve(s);
        const restantPos = Math.max(restant,0);
        if(!abandon){ totalDuGlobal += totalDu; totalVerse += verse; totalRestant += restantPos; totalArriereRestant += arriereRestant; }
        ctx.fillStyle = '#1B2A4A';
        ctx.fillText(`${s.prenom} ${s.nom}${abandon?' (Abandon)':''}`, 60, cy);
        ctx.fillText(s.classe||'—', 320, cy);
        ctx.fillText(abandon?'—':formatMontant(totalDu), 430, cy);
        ctx.fillStyle = '#2F6B4F';
        ctx.fillText(abandon?'—':formatMontant(verse), 555, cy);
        ctx.fillStyle = restant>0 ? '#8B2635' : '#2F6B4F';
        ctx.fillText(abandon?'—':formatMontant(restantPos), 675, cy);
        ctx.strokeStyle = '#D9D2BE'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(60,cy+16); ctx.lineTo(W-60,cy+16); ctx.stroke();
        cy += 50;
      });

      cy += 12;
      ctx.strokeStyle = '#1B2A4A'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(60,cy); ctx.lineTo(W-60,cy); ctx.stroke();
      cy += 38;

      const reduction = (state.reductionsFamille||{})[fam.key] || 0;
      const totalApresReduction = Math.max(totalRestant - reduction, 0);
      const totaux = [
        ['Arriéré restant (tous les enfants)', formatMontant(totalArriereRestant), totalArriereRestant>0?'#8B2635':'#2F6B4F'],
        ['Total à payer (tous les enfants)', formatMontant(totalDuGlobal), '#1B2A4A'],
        ['Total déjà payé (tous les enfants)', formatMontant(totalVerse), '#2F6B4F'],
        ['Restant dû (tous les enfants)', formatMontant(totalRestant), totalRestant>0?'#8B2635':'#2F6B4F'],
      ];
      if(reduction>0){
        totaux.push(['Réduction accordée', `- ${formatMontant(reduction)}`, '#2F6B4F']);
        totaux.push(['Restant dû après réduction', formatMontant(totalApresReduction), totalApresReduction>0?'#8B2635':'#2F6B4F']);
      }
      totaux.forEach(([label, val, color])=>{
        ctx.fillStyle = '#4A5568';
        ctx.font = '14px Arial';
        ctx.fillText(label, 60, cy);
        ctx.fillStyle = color;
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'right';
        ctx.fillText(val, W-60, cy);
        ctx.textAlign = 'left';
        cy += 42;
      });

      cy += 28;
      const sigY = cy;
      ctx.fillStyle = '#1B2A4A';
      ctx.font = '16px Arial';
      ctx.textAlign = 'right';
      ctx.fillText('Le Directeur', W-60, sigY);
      ctx.strokeStyle = '#1B2A4A';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(W-60-ctx.measureText('Le Directeur').width, sigY+4); ctx.lineTo(W-60, sigY+4); ctx.stroke();
      if(cachetImg) ctx.drawImage(cachetImg, W-260, sigY+14, 65, 65);
      if(sigImg) ctx.drawImage(sigImg, W-175, sigY+22, 115, 48);
      ctx.font = '15px Arial';
      ctx.fillText(info.directeur || '', W-60, sigY+90);
      ctx.textAlign = 'left';

      resolve(canvas);
    })();
  });
}

}

async function envoyerRapportFamilleWhatsApp(key){
  const fam = getFamilyGroup(decodeURIComponent(key));
  if(!fam){ alert("Famille introuvable."); return; }
  const canvas = await buildRapportFamilleCanvas(fam);
  const fileName = rapportFamilleFileName(fam);
  let totalDuGlobal=0, totalVerse=0, totalRestant=0, totalArriereRestant=0;
  fam.enfants.forEach(s=>{
    if(isAbandon(s.id)) return;
    const {totalDu, verse, restant, arriereRestant} = soldeEleve(s);
    totalDuGlobal += totalDu; totalVerse += verse; totalRestant += Math.max(restant,0); totalArriereRestant += arriereRestant;
  });
  const reduction = (state.reductionsFamille||{})[fam.key] || 0;
  const totalApresReduction = Math.max(totalRestant - reduction, 0);
  const texte = `Rapport de paiement — ${state.schoolInfo.nom}\nParent : ${fam.nom}\nArriéré restant : ${formatMontant(totalArriereRestant)}\nTotal à payer : ${formatMontant(totalDuGlobal)}\nTotal payé : ${formatMontant(totalVerse)}\nRestant dû : ${formatMontant(totalRestant)}${reduction>0?`\nRéduction accordée : -${formatMontant(reduction)}\nRestant dû après réduction : ${formatMontant(totalApresReduction)}`:''}`;

  canvas.toBlob(async (blob)=>{
    const file = new File([blob], fileName, {type:'image/jpeg'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({ files:[file], title:'Rapport de paiement', text: texte });
        return;
      }catch(e){
        if(e && e.name==='AbortError') return;
      }
    }
    const link = document.createElement('a');
    link.download = fileName;
    link.href = URL.createObjectURL(blob);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    const numero = formatWhatsAppNumber(fam.tel);
    const waUrl = numero ? `https://wa.me/${numero}?text=${encodeURIComponent(texte)}` : `https://wa.me/?text=${encodeURIComponent(texte)}`;
    alert("Ton navigateur ne permet pas d'envoyer l'image directement dans WhatsApp. Le rapport a été téléchargé : ouvre WhatsApp puis joins-le manuellement à la conversation qui va s'ouvrir.");
    window.open(waUrl, '_blank');
  }, 'image/jpeg', 0.92);
}

/* ============ CERTIFICAT DE SCOLARITÉ ============ */
function downloadCertificatScolarite(studentId){
  const s = state.students.find(x=>x.id===studentId);
  if(!s){ alert("Élève introuvable."); return; }
  try{
    const info = state.schoolInfo;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const startY = pdfHeader(doc, "CERTIFICAT DE SCOLARITÉ");

    const genre = s.sexe==='F' ? 'e' : '';
    const neLe = s.dateNaissance ? new Date(s.dateNaissance).toLocaleDateString('fr-FR') : '(date de naissance non renseignée)';
    const lieu = s.lieuNaissance || '(lieu non renseigné)';
    const nomParents = [s.pereNom, s.mereNom].filter(Boolean).join(' et ');

    const texte = `Je soussigné${info.directeur && /^Mme|^Madame/i.test(info.directeur)?'e':''}, ${info.directeur || '(nom du directeur non renseigné)'}, Directeur${genre?'trice':''} de ${info.nom}, certifie que l'élève :\n\n${s.prenom} ${s.nom}, matricule N° ${s.matricule||'—'}, né${genre} le ${neLe} à ${lieu}${nomParents ? `, enfant de ${nomParents}` : ''},\n\nest régulièrement inscrit${genre} dans notre établissement en classe de ${s.classe||'—'}, au titre de l'année scolaire ${info.anneeScolaire||'—'}.\n\nEn foi de quoi, le présent certificat lui est délivré pour servir et valoir ce que de droit.`;

    doc.setFontSize(11);
    doc.setFont(undefined, 'normal');
    const lines = doc.splitTextToSize(texte, 175);
    doc.text(lines, 18, startY + 15);

    const afterTextY = startY + 15 + lines.length*6.2;
    doc.setFontSize(10);
    doc.text(`Délivré le ${new Date().toLocaleDateString('fr-FR')}`, 18, afterTextY + 10);

    pdfSignature(doc, afterTextY + 30);
    doc.save(`certificat-scolarite-${(s.nom||'eleve').replace(/\s+/g,'_')}-${s.matricule||todayStr()}.pdf`);
  }catch(e){ alert("Export impossible : connecte-toi une fois à Internet pour charger l'outil d'export, puis réessaie."); }
}

function applyGroupTarget(clsKey){
  const cls = decodeURIComponent(clsKey);
  const groupInput = document.getElementById(`groupTarget_${cssSafe(cls)}`);
  const target = groupInput.value.trim();
  if(!target) return;
  document.querySelectorAll('.promo-classe-input').forEach(inp=>{
    const s = state.students.find(x=>x.id===inp.dataset.student);
    if(s && s.classe===cls) inp.value = target;
  });
}
async function applyPromotion(){
  if(!(await confirmModal("Confirmer le passage à la nouvelle année scolaire ? Cette action va modifier les classes des élèves concernés et réinitialiser certaines données selon les options cochées. Cela ne peut pas être annulé automatiquement."))) return;

  const nouvelleAnnee = document.getElementById('promoAnnee').value.trim();
  const reporter = document.getElementById('promoReporter').checked;
  const resetNotes = document.getElementById('promoNotes').checked;
  const resetPresences = document.getElementById('promoPresences').checked;

  // 1. Report du solde en arriéré (calculé AVANT changement de classe, car il dépend des frais de la classe actuelle)
  if(reporter){
    state.students.forEach(s=>{
      const { restant } = soldeEleve(s);
      s.arriere = Math.max(restant, 0);
    });
    state.payments = [];
  }

  // 2. Détermination automatique du statut Passant/Redoublant pour l'année suivante (basé sur la moyenne annuelle, avant réinitialisation des notes)
  // Ce redoublement est constaté DANS NOTRE ÉCOLE : la réduction de 50% est donc accordée automatiquement ici (et seulement ici).
  state.students.forEach(s=>{
    if(isAbandon(s.id)){
      s.statutClasse = 'Redoublant';
      s.reductionRedoublant = true;
      return;
    }
    const g = state.grades.find(x=>x.studentId===s.id);
    if(g){
      const n = devoirCount(s.niveau);
      const valid = (g.notes||[]).slice(0,n).filter(v=>v!==undefined&&v!==null&&v!=='');
      if(valid.length){
        const moy = valid.reduce((a,b)=>a+Number(b),0)/valid.length;
        s.statutClasse = moy>=10 ? 'Passant' : 'Redoublant';
        s.reductionRedoublant = moy>=10 ? false : true;
      }
    }
  });

  // 3. Application des nouvelles classes
  document.querySelectorAll('.promo-classe-input').forEach(inp=>{
    const val = inp.value.trim();
    if(!val) return;
    const s = state.students.find(x=>x.id===inp.dataset.student);
    if(s) s.classe = val;
  });

  // 4. Nouvelle année scolaire
  if(nouvelleAnnee) state.schoolInfo.anneeScolaire = nouvelleAnnee;

  // 5. Réinitialisations optionnelles
  if(resetNotes) state.grades = [];
  if(resetPresences) state.attendance = [];

  await saveState();
  alert("Passage à la nouvelle année scolaire effectué avec succès !");
  currentTab = 'students';
  render();
}
