async function saveFamilyRegistration(){
  const pereNom = document.getElementById('fam_pereNom').value.trim();
  const pereTel1 = document.getElementById('fam_pereTel1').value.trim();
  const pereTravail = document.getElementById('fam_pereTravail').value.trim();
  const mereNom = document.getElementById('fam_mereNom').value.trim();
  const mereTel1 = document.getElementById('fam_mereTel1').value.trim();
  const mereTravail = document.getElementById('fam_mereTravail').value.trim();
  const parentEmail = document.getElementById('fam_email').value.trim();
  const dateInscription = document.getElementById('fam_dateInscription').value;

  if(!pereNom && !mereNom){ alert("Renseigne au moins le nom du père ou de la mère."); return; }

  const rows = document.querySelectorAll('#familyChildrenContainer .family-child-row');
  const childrenData = [];
  rows.forEach(row=>{
    const prenom = row.querySelector('.fc_prenom').value.trim();
    const nom = row.querySelector('.fc_nom').value.trim();
    if(!prenom || !nom) return;
    childrenData.push({
      prenom, nom,
      sexe: row.querySelector('.fc_sexe').value,
      dateNaissance: row.querySelector('.fc_naissance').value,
      lieuNaissance: row.querySelector('.fc_lieu').value.trim(),
      classe: row.querySelector('.fc_classe').value.trim(),
      niveau: row.querySelector('.fc_niveau').value,
      statutClasse: row.querySelector('.fc_statut').value,
      arriere: parseFloat(row.querySelector('.fc_arriere').value)||0,
      verse: parseFloat(row.querySelector('.fc_verse').value)||0,
      fraisInscriptionActif: row.querySelector('.fc_fraisInscription').value==='oui',
    });
  });
  if(childrenData.length===0){ alert("Renseigne au moins un enfant avec un prénom et un nom."); return; }

  childrenData.forEach(child=>{
    const matricule = generateMatricule(dateInscription, pereNom, mereNom);
    const newStudent = {
      id: uid(), matricule,
      prenom: child.prenom, nom: child.nom, classe: child.classe, niveau: child.niveau,
      sexe: child.sexe, dateNaissance: child.dateNaissance, lieuNaissance: child.lieuNaissance,
      statutClasse: child.statutClasse,
      reductionRedoublant: false,
      fraisInscriptionActif: child.fraisInscriptionActif,
      pereNom, pereTel1, pereTravail, mereNom, mereTel1, mereTravail, parentEmail,
      dateInscription, arriere: child.arriere,
    };
    state.students.push(newStudent);
    if(child.verse > 0){
      const payment = {
        id: uid(), studentId: newStudent.id, motif: "Versement initial",
        montant: child.verse, echeance: dateInscription, datePaiement: dateInscription, statut: 'paye'
      };
      state.payments.push(payment);
      syncPaymentToFinances(payment);
    }
  });

  await saveState();
  closeModal();
  render();
}

/* ============ EXPORT PDF DE L'EMPLOI DU TEMPS ============ */
function exportSchedulePDF(){
  const classes = [...new Set(state.students.map(s=>s.classe).filter(Boolean))].sort();
  const selClass = document.getElementById('schedClassFilter')?.value || classes[0] || '';
  const slots = state.schedule.filter(sl=>!selClass || sl.classe===selClass);
  if(slots.length===0){ alert("Aucun cours renseigné pour cette classe."); return; }
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape' });
    const startY = pdfHeader(doc, `Emploi du temps — ${selClass || "Toute l'école"}`);
    const plages = state.plagesHoraires;
    const head = [['Horaire', ...JOURS]];
    const body = plages.map(range=>{
      const row = [range];
      JOURS.forEach(j=>{
        const daySlots = slots.filter(sl=>sl.jour===j && sl.plage===range);
        row.push(daySlots.map(sl=>`${sl.matiere}${sl.enseignant?' ('+sl.enseignant+')':''}`).join('\n') || '—');
      });
      return row;
    });
    doc.autoTable({
      startY,
      head, body,
      styles:{fontSize:9, cellPadding:3, valign:'middle'},
      headStyles:{fillColor:[27,42,74]},
      columnStyles:{0:{fontStyle:'bold', cellWidth:28}}
    });
    pdfSignature(doc, doc.lastAutoTable.finalY + 20);
    doc.save(`emploi-du-temps-${(selClass||'toute-ecole').replace(/\s+/g,'_')}-${todayStr()}.pdf`);
  }catch(e){ alert("Export impossible : connecte-toi une fois à Internet pour charger l'outil d'export, puis réessaie."); }
}

/* ============ COURRIER PDF POUR LES MESSAGES AUX PARENTS ============ */
function buildMessagePDFDoc(m){
  const s = m.studentId ? state.students.find(x=>x.id===m.studentId) : null;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const startY = pdfHeader(doc, typeLabel(m.type).toUpperCase());

  const nomParents = s ? [s.pereNom, s.mereNom].filter(Boolean).join(' et ') : '';
  doc.setFontSize(10);
  doc.setFont(undefined, 'normal');
  doc.text(`Date : ${m.date||todayStr()}`, 14, startY + 4);
  if(m.studentId){
    doc.text(`À l'attention de : ${nomParents || 'Parent/tuteur'}`, 14, startY + 11);
    doc.text(`Concernant l'élève : ${s ? `${s.prenom} ${s.nom} (${s.classe||'—'})` : '—'}`, 14, startY + 18);
  }else{
    doc.text(`À l'attention de : Tous les parents d'élèves`, 14, startY + 11);
  }

  doc.setDrawColor(217,210,190);
  doc.setLineWidth(0.4);
  doc.line(14, startY+24, 196, startY+24);

  doc.setFontSize(11);
  const lines = doc.splitTextToSize(m.message||'', 175);
  doc.text(lines, 14, startY + 34);

  const afterTextY = startY + 34 + lines.length*6.2;
  pdfSignature(doc, afterTextY + 20);
  return doc;
}
function downloadMessagePDF(messageId){
  const m = state.messages.find(x=>x.id===messageId);
  if(!m){ alert("Message introuvable."); return; }
  try{
    const doc = buildMessagePDFDoc(m);
    const s = m.studentId ? state.students.find(x=>x.id===m.studentId) : null;
    doc.save(`courrier-${typeLabel(m.type).toLowerCase()}-${(s?s.nom:'tous-les-parents').replace(/\s+/g,'_')}-${m.date||todayStr()}.pdf`);
  }catch(e){ alert("Export impossible : connecte-toi une fois à Internet pour charger l'outil d'export, puis réessaie."); }
}
async function envoyerMessageWhatsApp(messageId){
  const m = state.messages.find(x=>x.id===messageId);
  if(!m){ alert("Message introuvable."); return; }
  const s = m.studentId ? state.students.find(x=>x.id===m.studentId) : null;
  try{
    const doc = buildMessagePDFDoc(m);
    const blob = doc.output('blob');
    const fileName = `courrier-${typeLabel(m.type).toLowerCase()}-${(s?s.nom:'tous-les-parents').replace(/\s+/g,'_')}-${m.date||todayStr()}.pdf`;
    const file = new File([blob], fileName, {type:'application/pdf'});
    const texte = `${typeLabel(m.type)} — ${state.schoolInfo.nom}\nConcernant : ${s?s.prenom+' '+s.nom:'Tous les parents'}\n${m.message}`;

    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({ files:[file], title: typeLabel(m.type), text: texte });
        return;
      }catch(e){ if(e && e.name==='AbortError') return; }
    }
    const link = document.createElement('a');
    link.download = fileName;
    link.href = URL.createObjectURL(blob);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    const numero = formatWhatsAppNumber(s ? primaryParentPhone(s) : '');
    const waUrl = numero ? `https://wa.me/${numero}?text=${encodeURIComponent(texte)}` : `https://wa.me/?text=${encodeURIComponent(texte)}`;
    alert("Ton navigateur ne permet pas d'envoyer le PDF directement dans WhatsApp. Le courrier a été téléchargé : ouvre WhatsApp puis joins-le manuellement à la conversation qui va s'ouvrir.");
    window.open(waUrl, '_blank');
  }catch(e){ alert("Export impossible : connecte-toi une fois à Internet pour charger l'outil d'export, puis réessaie."); }
}

async function envoyerStaffDocumentsWhatsApp(staffKey){
  const staffName = decodeURIComponent(staffKey);
  try{

    const blob = doc.output('blob');
    const fileName = `documents-${staffName.replace(/\s+/g,'_')}-${todayStr()}.pdf`;
    const file = new File([blob], fileName, {type:'application/pdf'});

    const texte = `Documents/outils à ta charge — ${state.schoolInfo.nom}\n${liste}`;

      catch(e){ if(e && e.name==='AbortError') return; }

    const waUrl = numero ? `https://wa.me/${numero}?text=${encodeURIComponent(texte)}` : `https://wa.me/?text=${encodeURIComponent(texte)}`;

function exportSyntheseNotesPDF(){
  const cls = document.getElementById('notesClassFilter')?.value || '';
  const list = state.students.filter(s=>!cls || s.classe===cls);
  if(list.length===0){ alert("Aucun élève à exporter pour ce filtre."); return; }
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = pdfHeader(doc, `Synthèse des résultats — ${cls || "Toute l'école"}`);

    const byClasse = {};
    list.forEach(s=>{ const c=s.classe||'—'; (byClasse[c]=byClasse[c]||[]).push(s); });

    Object.keys(byClasse).sort().forEach(classe=>{
      const studs = byClasse[classe];
      const maxDevoirs = Math.max(...studs.map(s=>devoirCount(s.niveau)));

      if(y > 265){ doc.addPage(); y = 20; }
      doc.setFontSize(13);
      doc.setFont(undefined, 'bold');
      doc.text(classe, 14, y);
      doc.setFont(undefined, 'normal');
      y += 6;

      for(let i=0;i<maxDevoirs;i++){
        const d = synthDataRows(studs, s=>{
          const g = state.grades.find(x=>x.studentId===s.id);
          if(!g) return null;
          const n = devoirCount(s.niveau);
          if(i>=n) return null;
          const v = g.notes[i];
          return (v!==undefined && v!==null && v!=='') ? Number(v) : null;
        });
        if(y > 250){ doc.addPage(); y = 20; }
        doc.setFontSize(10);
        doc.setFont(undefined, 'bold');
        doc.text(`Devoir ${i+1}`, 14, y+4);
        doc.setFont(undefined, 'normal');
        doc.autoTable({
          startY: y+7,
          head: [['','Garçons','Filles','Total']],
          body: d.asRows(),
          styles:{fontSize:8, cellPadding:2.5},
          headStyles:{fillColor:[27,42,74]},
          margin:{left:14, right:14},
        });
        y = doc.lastAutoTable.finalY + 8;
      }

      const dAnnuel = synthDataRows(studs, s=>{
        const g = state.grades.find(x=>x.studentId===s.id);
        if(!g) return null;
        const n = devoirCount(s.niveau);
        const valid = (g.notes||[]).slice(0,n).filter(v=>v!==undefined && v!==null && v!=='');
        if(!valid.length) return null;
        return valid.reduce((a,b)=>a+Number(b),0)/valid.length;
      });
      if(y > 250){ doc.addPage(); y = 20; }
      doc.setFontSize(10);
      doc.setFont(undefined, 'bold');
      doc.text('Synthèse annuelle', 14, y+4);
      doc.setFont(undefined, 'normal');
      doc.autoTable({
        startY: y+7,
        head: [['','Garçons','Filles','Total']],
        body: dAnnuel.asRows(),
        styles:{fontSize:8, cellPadding:2.5},
        headStyles:{fillColor:[27,42,74]},
        margin:{left:14, right:14},
      });
      y = doc.lastAutoTable.finalY + 16;
    });

    pdfSignature(doc, y + 6);
    doc.save(`synthese-resultats-${(cls||'toute-ecole').replace(/\s+/g,'_')}-${todayStr()}.pdf`);
  }catch(e){ alert("Export impossible : connecte-toi une fois à Internet pour charger l'outil d'export, puis réessaie."); }
}

function downloadBackup(){
  try{
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], {type:'application/octet-stream'});
    const url = URL.createObjectURL(blob);
    const filename = `sauvegarde-registre-${(state.schoolInfo.nom||'ecole').replace(/\s+/g,'_')}-${todayStr()}.json`;
    const link = document.createElement('a');
    link.download = filename;
    link.href = url;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    // Pas de révocation immédiate de l'URL : on laisse le temps au téléchargement de lire le contenu.
  }catch(e){
    alert("Erreur pendant la sauvegarde : " + (e && e.message ? e.message : e));
  }
}
async function restoreBackup(event){
  const file = event.target.files[0];
  if(!file) return;
  if(!(await confirmModal("Restaurer cette sauvegarde va REMPLACER toutes les données actuelles de cet appareil par celles du fichier. Continuer ?"))){
    event.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const restored = JSON.parse(e.target.result);
      if(!restored || typeof restored !== 'object' || !Array.isArray(restored.students)){
        alert("Ce fichier ne ressemble pas à une sauvegarde valide de cette application.");
        return;
      }
      state = restored;
      await saveState();
      alert("Sauvegarde restaurée avec succès !");
      closeModal();
      render();
    }catch(err){
      alert("Impossible de lire ce fichier. Vérifie qu'il s'agit bien d'un fichier de sauvegarde exporté depuis cette application.");
    }
  };
  reader.readAsText(file);
}

/* ============ POURCENTAGE DES RESTANTS DÛS (ÉLÈVE / CLASSE / ÉCOLE) ============ */
function calculPourcentagesParClasse(){
  const actifs = state.students.filter(s=>!isAbandon(s.id));
  const parClasse = {};
  actifs.forEach(s=>{
    const { totalDu, restant } = soldeEleve(s);
    const cls = s.classe || '— Sans classe —';
    if(!parClasse[cls]) parClasse[cls] = { totalDu:0, restant:0 };
    parClasse[cls].totalDu += totalDu;
    parClasse[cls].restant += Math.max(restant,0);
  });
  const lignes = Object.keys(parClasse).sort().map(cls=>{
    const d = parClasse[cls];
    const pct = d.totalDu>0 ? Math.round(d.restant/d.totalDu*1000)/10 : 0;
    return { classe: cls, totalDu: d.totalDu, restant: d.restant, pct };
  });
  const totalEcoleDu = lignes.reduce((s,l)=>s+l.totalDu, 0);
  const totalEcoleRestant = lignes.reduce((s,l)=>s+l.restant, 0);
  const pctEcole = totalEcoleDu>0 ? Math.round(totalEcoleRestant/totalEcoleDu*1000)/10 : 0;
  return { lignes, totalEcoleDu, totalEcoleRestant, pctEcole };
}
function renderPourcentageRestantsTable(){
  const { lignes, totalEcoleDu, totalEcoleRestant, pctEcole } = calculPourcentagesParClasse();
  if(lignes.length===0) return '<div class="empty">Aucune donnée disponible.</div>';
  return `
    <table>
      <thead><tr><th>Classe</th><th>Total dû</th><th>Restant dû</th><th>% restant dû</th></tr></thead>
      <tbody>
        ${lignes.map(l=>`

            <td class="mono" style="color:${l.pct>0?'var(--bordeaux)':'var(--pine)'};">${l.totalDu>0?l.pct+'%':'—'}</td>
          </tr>
        `).join('')}
        <tr style="border-top:2px solid var(--ink);">
          <td><strong>Toute l'école</strong></td>
          <td class="mono"><strong>${formatMontant(totalEcoleDu)}</strong></td>

        </tr>
      </tbody>
    </table>
  `;
}

/* ============ PLANNING PAR NIVEAU (mois en colonnes, activités en lignes) ============ */
const MOIS_PLANNING = ["Septembre","Octobre","Novembre","Décembre","Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août"];
function renderPlanning(){
  const niveau = document.getElementById('planningNiveauFilter')?.value || 'Primaire';
  const activites = state.planningActivites.filter(a=>a.niveau===niveau);
  // Regroupe les activités par jour du mois (1-31) et par colonne de mois (0=Septembre ... 11=Août)
  const grille = {};
  activites.forEach(a=>{
    if(!a.date) return;
    const jour = parseInt(a.date.split('-')[2], 10);
    const moisIndex = planningMoisIndex(a.date);
    if(!jour || moisIndex<0) return;
    const cle = `${jour}-${moisIndex}`;
    if(!grille[cle]) grille[cle] = [];
    grille[cle].push(a);
  });
  const joursSansDate = activites.filter(a=>!a.date);
  return `
    <div class="page-head">
      <div><h2>Planning</h2><p>Activités de l'année, organisées par niveau — ${state.schoolInfo.anneeScolaire||''}</p></div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="openPlanningActiviteForm()">+ Ajouter une activité</button>
        <button class="btn btn-outline btn-sm" onclick="exportPlanningPDF()">Exporter PDF</button>
      </div>
    </div>
    <div class="toolbar">
      <div class="filters">
        <select id="planningNiveauFilter" onchange="render()">
          <option value="Primaire" ${niveau==='Primaire'?'selected':''}>Primaire</option>
          <option value="Collège" ${niveau==='Collège'?'selected':''}>Collège</option>
        </select>
      </div>
    </div>
    ${joursSansDate.length>0 ? `<div class="section-block"><p style="font-size:12.5px; color:var(--ink-soft); margin:0;">⚠ ${joursSansDate.length} activité(s) sans date renseignée, non affichée(s) dans la grille : ${joursSansDate.map(a=>escapeHtml(a.nom)).join(', ')}</p></div>` : ''}
    <div class="section-block" style="overflow-x:auto;">
      ${activites.length===0 ? '<div class="empty">Aucune activité planifiée pour ce niveau. Ajoutes-en une avec le bouton ci-dessus.</div>' : `
      <table>
        <thead><tr><th>Jour</th>${MOIS_PLANNING.map(m=>`<th>${m.slice(0,3)}</th>`).join('')}</tr></thead>
        <tbody>
          ${Array.from({length:31}, (_,i)=>i+1).map(jour=>`
            <tr style="border-bottom:1.5px solid var(--line);">
              <td class="mono" style="font-weight:600;">${jour}</td>
              ${MOIS_PLANNING.map((m,moisIndex)=>{
                const acts = grille[`${jour}-${moisIndex}`] || [];
                if(acts.length===0) return `<td></td>`;
                return `<td style="font-size:11.5px; padding:6px 8px;">${acts.map(a=>`
                  <div style="margin-bottom:3px; padding:2px 5px; background:var(--paper-panel); border-left:2px solid var(--brass); border-radius:2px;">
                    ${escapeHtml(a.nom)}
                    <span class="row-actions" style="display:inline-flex; gap:4px; margin-left:4px;">
                      <a href="#" onclick="openPlanningActiviteForm('${a.id}'); return false;" style="font-size:10px;">✏️</a>
                      <a href="#" onclick="deletePlanningActivite('${a.id}'); return false;" style="font-size:10px; color:var(--bordeaux);">✕</a>
                    </span>
                  </div>`).join('')}</td>`;
              }).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>`}
    </div>
  `;
}
/* Renvoie l'index (0=Septembre ... 11=Août) du mois d'une date AAAA-MM-JJ, ou -1 si vide */
function planningMoisIndex(iso){
  if(!iso) return -1;
  const m = parseInt(iso.split('-')[1], 10); // 1=janvier ... 12=décembre
  if(!m) return -1;
  // Réordonne pour une année scolaire commençant en septembre (index 0) et finissant en août (index 11)
  return m>=9 ? m-9 : m+3;
}

      return [String(jour), ...cells];
    });
    doc.autoTable({
      startY,
      head, body,
      styles:{fontSize:7, halign:'center', cellPadding:1.5},
      columnStyles:{0:{halign:'center', fontStyle:'bold', cellWidth:12}},
      headStyles:{fillColor:[27,42,74]},
    });
    pdfSignature(doc, doc.lastAutoTable.finalY + 20);
    doc.save(`planning-${niveau.toLowerCase()}-${todayStr()}.pdf`);
  }catch(e){ alert("Export impossible : connecte-toi une fois à Internet pour charger l'outil d'export, puis réessaie."); }
}

/* ============ PARENTS & ENFANTS ============ */
function computeFamilyGroups(){
  const groups = {};
  state.students.forEach(s=>{
    const nomAffiche = [s.pereNom, s.mereNom].filter(Boolean).join(' & ') || '— Parent non renseigné —';
    const key = `${(s.pereNom||'').trim().toLowerCase()}|${(s.mereNom||'').trim().toLowerCase()}`;
    if(!groups[key]) groups[key] = {
      key, nom:nomAffiche, tel:'', email:'', enfants:[],
      pereNom:s.pereNom||'', pereTel1:s.pereTel1||'', pereTravail:s.pereTravail||'',
      mereNom:s.mereNom||'', mereTel1:s.mereTel1||'', mereTravail:s.mereTravail||'',
    };
    groups[key].enfants.push(s);
    if(!groups[key].tel) groups[key].tel = primaryParentPhone(s);
    if(!groups[key].email && s.parentEmail) groups[key].email = s.parentEmail;
  });
  return Object.values(groups).sort((a,b)=> a.nom.localeCompare(b.nom, 'fr'));
}
function getFamilyGroup(nom){
  return computeFamilyGroups().find(f=>f.nom===nom) || null;
}
function getFamilyGroupByKey(key){
  return computeFamilyGroups().find(f=>f.key===key) || null;
}
function renderFamilles(){
  const search = (document.getElementById('parentSearch')?.value||'').toLowerCase();
  let list = computeFamilyGroups();
  if(search) list = list.filter(f=> f.nom.toLowerCase().includes(search) || (f.tel||'').includes(search));
  return `
    <div class="page-head">
      <div><h2>Parents &amp; enfants</h2><p>${list.length} parent(s)/tuteur(s) — enfants et état de paiement par famille</p></div>
    </div>
    <div class="toolbar">
      <div class="filters">
        <input type="text" id="parentSearch" placeholder="Rechercher un parent (nom ou téléphone)…" style="min-width:260px;" oninput="render()">
      </div>
    </div>
    ${list.length===0 ? '<div class="section-block"><div class="empty">Aucune famille ne correspond.</div></div>' : list.map(fam=>{
      const enfants = sortStudents(fam.enfants);
      const key = encodeURIComponent(fam.nom);
      return `
      <div class="section-block">
        <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:14px;">
          <div>
            <strong style="font-family:'Fraunces',serif; font-size:17px;">${escapeHtml(fam.nom)}</strong>
            <div class="mono" style="font-size:12.5px; color:var(--ink-soft); margin-top:3px;">${escapeHtml(fam.tel)||'Téléphone non renseigné'}${fam.email?' · '+escapeHtml(fam.email):''}</div>
          </div>
          <span class="stamp-badge stamp-brass">${enfants.length} enfant${enfants.length>1?'s':''}</span>
        </div>
        <table>
          <thead><tr><th>Enfant</th><th>Classe</th><th>Frais annuel</th><th>Arriéré</th><th>Versé</th><th>Statut</th></tr></thead>
          <tbody>
            ${enfants.map(s=>{
              const {frais, arriereRestant, totalDu, verse, restant} = soldeEleve(s);
              const statut = totalDu===0
                ? '<span class="stamp-badge stamp-brass">FRAIS NON DÉFINI</span>'
                : (restant<=0 ? '<span class="stamp-badge stamp-pine">SOLDÉ</span>' : `<span class="stamp-badge stamp-bordeaux">RESTANT : ${formatMontant(restant)}</span>`);
              return `<tr>
                <td>${nomEleveHtml(s)}</td>
                <td>${escapeHtml(s.classe)||'—'}</td>
                <td class="mono">${formatMontant(frais)}</td>
                <td class="mono">${formatMontant(arriereRestant)}</td>
                <td class="mono" style="color:var(--pine);">${formatMontant(verse)}</td>
                <td>${statut}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        ${(()=>{
          const reduction = state.reductionsFamille[fam.key] || 0;
          let totalRestantFamille = 0;
          enfants.forEach(s=>{ if(!isAbandon(s.id)) totalRestantFamille += Math.max(soldeEleve(s).restant, 0); });
          const apresReduction = Math.max(totalRestantFamille - reduction, 0);
          return `
          <div style="margin-top:12px; padding-top:12px; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
            <div style="font-size:13.5px;">
              <div>Restant dû total (avant réduction) : <strong class="mono">${formatMontant(totalRestantFamille)}</strong></div>
              ${reduction>0 ? `<div style="color:var(--pine);">Réduction accordée : <strong class="mono">-${formatMontant(reduction)}</strong></div>
              <div>Restant dû après réduction : <strong class="mono" style="color:${apresReduction>0?'var(--bordeaux)':'var(--pine)'};">${formatMontant(apresReduction)}</strong></div>` : ''}
            </div>
            <button class="btn btn-outline btn-sm" onclick="openReductionForm('${encodeURIComponent(fam.key)}')">💲 Réduction</button>
          </div>`;
        })()}
        <div style="display:flex; gap:8px; margin-top:12px;">
          <button class="btn btn-outline btn-sm" onclick="downloadRapportFamilleJPEG('${key}')">🧾 Rapport JPEG</button>
          <button class="btn btn-outline btn-sm" onclick="envoyerRapportFamilleWhatsApp('${key}')">📲 Envoyer WhatsApp</button>
        </div>
      </div>`;
    }).join('')}
  `;
}
function openReductionForm(key){
  const fam = getFamilyGroupByKey(decodeURIComponent(key));
  if(!fam){ alert("Famille introuvable."); return; }
  const current = state.reductionsFamille[fam.key] || 0;
  openModal(`
    <h3>Réduction accordée</h3>
    <p style="font-size:12.5px; color:var(--ink-soft); margin-top:-8px;">Pour : <strong>${escapeHtml(fam.nom)}</strong></p>
    <div class="form-grid wide">
      <div class="field"><label>Montant de la réduction (FCFA)</label><input type="number" step="1" id="f_reductionMontant" value="${current||''}" placeholder="0"></div>
    </div>
    <p style="font-size:11.5px; color:var(--ink-soft); margin-top:-4px;">Ce montant sera déduit du restant dû total de cette famille, dans l'onglet Parents &amp; enfants et sur le rapport de paiement. Mets 0 pour retirer la réduction.</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveReductionFamille('${key}')">Enregistrer</button>
    </div>
  `);
}
async function saveReductionFamille(key){
  const fam = getFamilyGroupByKey(decodeURIComponent(key));
  if(!fam) return;
  const montant = parseFloat(document.getElementById('f_reductionMontant').value)||0;
  if(!state.reductionsFamille) state.reductionsFamille = {};
  if(montant>0) state.reductionsFamille[fam.key] = montant;
  else delete state.reductionsFamille[fam.key];
  await saveState();
  closeModal();
  render();
}

/* ============ MOT DE PASSE D'ACCÈS ============ */
async function hashPassword(str){
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function showLockScreen(mode){
  const lock = document.getElementById('lockScreen');
  const app = document.getElementById('app');
  const fab = document.querySelector('.settings-fab');
  lock.style.display = 'flex';
  app.style.display = 'none';
  if(fab) fab.style.display = 'none';
  const confirmInput = document.getElementById('lockPasswordConfirm');
  const title = document.getElementById('lockTitle');
  const subtitle = document.getElementById('lockSubtitle');
  const submitBtn = document.getElementById('lockSubmitBtn');
  document.getElementById('lockError').style.display = 'none';
  document.getElementById('lockPasswordInput').value = '';
  confirmInput.value = '';
  if(mode==='setup'){
    title.textContent = 'Créer un code PIN';
    subtitle.textContent = "Choisis un code PIN (4 à 6 chiffres) pour protéger l'accès au registre sur cet appareil.";
    confirmInput.style.display = 'block';
    submitBtn.textContent = 'Créer et déverrouiller';
    submitBtn.onclick = handleLockSetup;
    document.getElementById('lockForgotBtn').style.display = 'none';
  }else{
    title.textContent = 'Accès protégé';
    subtitle.textContent = 'Entre ton code PIN pour ouvrir le registre.';
    confirmInput.style.display = 'none';
    submitBtn.textContent = 'Déverrouiller';
    submitBtn.onclick = handleLockUnlock;
    document.getElementById('lockForgotBtn').style.display = 'block';
  }
}
function hideLockScreen(){
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('app').style.display = '';
  const fab = document.querySelector('.settings-fab');
  if(fab) fab.style.display = '';
}
function isValidPin(pin){ return /^[0-9]{4,6}$/.test(pin||''); }
async function handleLockSetup(){
  const pwd = document.getElementById('lockPasswordInput').value;
  const confirm = document.getElementById('lockPasswordConfirm').value;
  const err = document.getElementById('lockError');
  if(!isValidPin(pwd)){ err.textContent = 'Le code PIN doit contenir entre 4 et 6 chiffres.'; err.style.display='block'; return; }
  if(pwd!==confirm){ err.textContent = 'Les deux codes PIN ne correspondent pas.'; err.style.display='block'; return; }
  const hash = await hashPassword(pwd);
  localStorage.setItem('ecole-auth-hash', hash);
  sessionStorage.setItem('ecole-unlocked', '1');
  hideLockScreen();
  await startApp();
}
async function handleLockUnlock(){
  const pwd = document.getElementById('lockPasswordInput').value;
  const err = document.getElementById('lockError');
  const stored = localStorage.getItem('ecole-auth-hash');
  const hash = await hashPassword(pwd);
  if(hash===stored){
    sessionStorage.setItem('ecole-unlocked', '1');
    hideLockScreen();
    await startApp();
  }else{
    err.textContent = 'Code PIN incorrect.';
    err.style.display = 'block';
  }
}
function handleLockSubmit(){
  const stored = localStorage.getItem('ecole-auth-hash');
  if(stored) handleLockUnlock(); else handleLockSetup();
}
async function lockApp(){
  sessionStorage.setItem('ecole-unlocked', '0');
  showLockScreen('unlock');
}
async function resetPinForgotten(){
  const ok = await confirmModal("Réinitialiser le code PIN oublié ? Tes données (élèves, paiements, notes, finances...) resteront intactes — seul le code d'accès sera réinitialisé, et tu devras en créer un nouveau.");
  if(!ok) return;
  localStorage.removeItem('ecole-auth-hash');
  sessionStorage.removeItem('ecole-unlocked');
  showLockScreen('setup');
}
async function changePassword(){
  const ancien = prompt("Code PIN actuel :");
  if(ancien===null) return;
  const stored = localStorage.getItem('ecole-auth-hash');
  const hashAncien = await hashPassword(ancien||'');
  if(hashAncien!==stored){ alert("Code PIN actuel incorrect."); return; }
  const nouveau = prompt("Nouveau code PIN (4 à 6 chiffres) :");
  if(!isValidPin(nouveau)){ alert("Code PIN invalide (4 à 6 chiffres requis), opération annulée."); return; }
  const confirmNouveau = prompt("Confirme le nouveau code PIN :");
  if(nouveau!==confirmNouveau){ alert("Les codes PIN ne correspondent pas, opération annulée."); return; }
  localStorage.setItem('ecole-auth-hash', await hashPassword(nouveau));
  alert("Code PIN mis à jour avec succès.");
}

async function startApp(){
  try{ await loadState(); }
  catch(e){ console.warn('Chargement initial impossible, démarrage avec un registre vide.', e); }
  buildShell();
  render();
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* pas de service worker disponible en local, ce n'est pas bloquant */ });
  }
}

/* ============ INIT ============ */
(async function init(){
  // Réinitialisation ponctuelle du code PIN à 0000 (dépannage), une seule fois
  if(!localStorage.getItem('ecole-pin-migrated-0000')){
    const hash0000 = await hashPassword('0000');
    localStorage.setItem('ecole-auth-hash', hash0000);
    sessionStorage.removeItem('ecole-unlocked');
    localStorage.setItem('ecole-pin-migrated-0000', '1');
  }
  const hasPassword = localStorage.getItem('ecole-auth-hash');
  const unlocked = sessionStorage.getItem('ecole-unlocked')==='1';
  if(!hasPassword){
    showLockScreen('setup');
  }else if(!unlocked){
    showLockScreen('unlock');
  }else{
    hideLockScreen();
    startApp();
  }
})();
</script>
